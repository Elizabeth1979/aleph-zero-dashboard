<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes</title>
<link rel="stylesheet" href="theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    font-family: var(--sans);
    font-size: var(--fs-base);
    color: var(--text);
    background: var(--bg);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: var(--s8) var(--s6);
  }

  /* --- Header --- */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--s8);
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: var(--s4);
  }
  .header-left img {
    height: 36px;
    border-radius: var(--r1);
  }
  .header-left h1 {
    font-size: var(--fs-2xl);
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .status-row {
    display: flex;
    align-items: center;
    gap: var(--s5);
  }
  .status-item {
    display: flex;
    align-items: center;
    gap: var(--s2);
    font-size: var(--fs-xs);
    color: var(--text-2);
  }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.on { background: var(--ok); }
  .dot.off { background: var(--text-3); }

  /* --- Bento Grid --- */
  .bento {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--s4);
  }
  .col-1 { grid-column: span 1; }
  .col-2 { grid-column: span 2; }
  .col-3 { grid-column: span 3; }
  .col-4 { grid-column: span 4; }

  @media (max-width: 800px) {
    .bento { grid-template-columns: 1fr; }
    .col-1, .col-2, .col-3, .col-4 { grid-column: span 1; }
    .wrap { padding: var(--s6) var(--s4); }
    .header { flex-direction: column; align-items: flex-start; gap: var(--s4); }
  }

  /* --- Card --- */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r3);
    padding: var(--s6);
    transition: border-color var(--transition), transform var(--transition);
    animation: fadeIn 0.4s ease both;
  }
  .card:hover {
    border-color: var(--border-hover);
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card:nth-child(1) { animation-delay: 0s; }
  .card:nth-child(2) { animation-delay: 0.04s; }
  .card:nth-child(3) { animation-delay: 0.08s; }
  .card:nth-child(4) { animation-delay: 0.12s; }
  .card:nth-child(5) { animation-delay: 0.16s; }
  .card:nth-child(6) { animation-delay: 0.20s; }
  .card:nth-child(7) { animation-delay: 0.24s; }
  .card:nth-child(8) { animation-delay: 0.28s; }

  /* --- Card Header --- */
  .card-h {
    display: flex;
    align-items: center;
    gap: var(--s3);
    margin-bottom: var(--s5);
  }
  .card-h svg {
    width: 18px;
    height: 18px;
    color: var(--accent);
    flex-shrink: 0;
  }
  .card-h h2 {
    font-size: var(--fs-sm);
    font-weight: 600;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .card-h .count {
    margin-left: auto;
    font-size: var(--fs-xs);
    font-family: var(--mono);
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-muted);
    padding: 2px 8px;
    border-radius: var(--pill);
  }

  /* --- Stat Card --- */
  .stat-val {
    font-size: var(--fs-3xl);
    font-weight: 700;
    font-family: var(--mono);
    color: var(--text);
    line-height: 1;
  }
  .stat-label {
    font-size: var(--fs-xs);
    color: var(--text-3);
    margin-top: var(--s2);
  }
  .usage-bar {
    height: 4px;
    background: rgba(255,255,255,0.04);
    border-radius: var(--pill);
    margin-top: var(--s4);
    overflow: hidden;
  }
  .usage-fill {
    height: 100%;
    border-radius: var(--pill);
    transition: width 0.8s ease;
  }
  .usage-fill.ok { background: var(--ok); }
  .usage-fill.warn { background: var(--warn); }
  .usage-fill.danger { background: var(--danger); }

  /* --- Task Item --- */
  .task {
    display: flex;
    align-items: center;
    gap: var(--s3);
    padding: var(--s3) 0;
    border-bottom: 1px solid var(--border);
  }
  .task:last-child { border-bottom: none; }
  .task.done { opacity: 0.35; }
  .task.done .task-text { text-decoration: line-through; }
  .task-check {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 1.5px solid var(--text-3);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .task.done .task-check {
    border-color: var(--accent-dim);
    background: var(--accent-muted);
  }
  .task.done .task-check svg { display: block; }
  .task-text {
    font-size: var(--fs-sm);
    color: var(--text);
    flex: 1;
  }
  .task-pri {
    font-size: var(--fs-xs);
    font-weight: 600;
    padding: 1px 8px;
    border-radius: var(--pill);
  }
  .task-pri.high { color: var(--danger); background: rgba(224,108,117,0.12); }
  .task-pri.medium { color: var(--warn); background: rgba(240,184,102,0.12); }
  .task-pri.low { color: var(--accent); background: var(--accent-muted); }
  .task-date {
    font-size: var(--fs-xs);
    font-family: var(--mono);
    color: var(--text-3);
  }

  /* --- Memory Entry --- */
  .mem-entry {
    padding: var(--s3) 0;
    border-bottom: 1px solid var(--border);
    font-size: var(--fs-sm);
    line-height: 1.6;
    color: var(--text);
    overflow-wrap: break-word;
  }
  .mem-entry:last-child { border-bottom: none; }
  .mem-label {
    font-size: var(--fs-xs);
    font-weight: 600;
    color: var(--accent-dim);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: var(--s1);
  }

  /* --- Cron Job --- */
  .cron {
    padding: var(--s4) 0;
    border-bottom: 1px solid var(--border);
  }
  .cron:last-child { border-bottom: none; }
  .cron-top {
    display: flex;
    align-items: center;
    gap: var(--s3);
    flex-wrap: wrap;
  }
  .cron-name {
    font-size: var(--fs-sm);
    font-weight: 600;
    color: var(--text);
  }
  .tag {
    font-size: var(--fs-xs);
    font-weight: 500;
    padding: 2px 8px;
    border-radius: var(--pill);
    background: rgba(255,255,255,0.04);
    color: var(--text-2);
  }
  .tag-accent {
    background: var(--accent-muted);
    color: var(--accent);
  }
  .cron-meta {
    font-size: var(--fs-xs);
    color: var(--text-3);
    margin-top: var(--s2);
  }
  .cron-prompt {
    margin-top: var(--s3);
    font-size: var(--fs-xs);
    color: var(--text-3);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: var(--s2);
  }
  .cron-prompt:hover { color: var(--text-2); }
  .cron-prompt-box {
    margin-top: var(--s3);
    padding: var(--s4);
    background: var(--bg-inset);
    border-radius: var(--r1);
    font-family: var(--mono);
    font-size: var(--fs-xs);
    color: var(--text-3);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 200px;
    overflow-y: auto;
  }

  /* --- Config Row --- */
  .cfg-row {
    display: flex;
    justify-content: space-between;
    padding: var(--s2) 0;
    font-size: var(--fs-sm);
    border-bottom: 1px solid var(--border);
  }
  .cfg-row:last-child { border-bottom: none; }
  .cfg-key { color: var(--text-3); }
  .cfg-val { color: var(--accent); font-weight: 500; }

  /* --- Skills --- */
  .skill-cat {
    margin-bottom: var(--s4);
  }
  .skill-cat-name {
    font-size: var(--fs-xs);
    font-weight: 600;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: var(--s2);
  }
  .skill-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .pill {
    font-size: var(--fs-xs);
    font-weight: 500;
    padding: 3px 10px;
    border-radius: var(--pill);
    background: rgba(255,255,255,0.04);
    color: var(--text-2);
    cursor: pointer;
    transition: all var(--transition);
    border: 1px solid transparent;
  }
  .pill:hover {
    background: var(--accent-muted);
    color: var(--accent);
  }
  .pill.active {
    background: var(--accent-muted);
    color: var(--accent);
    border-color: rgba(93,228,212,0.2);
  }
  .pill.custom::after {
    content: '\2605';
    margin-left: 4px;
    font-size: 10px;
  }
  .skill-detail {
    margin-top: var(--s5);
    padding: var(--s4);
    background: var(--bg-inset);
    border-radius: var(--r1);
    font-family: var(--mono);
    font-size: var(--fs-xs);
    color: var(--text-3);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 400px;
    overflow-y: auto;
    display: none;
  }
  .skill-detail.show { display: block; }

  /* --- Collapsible Raw --- */
  .raw-toggle {
    font-size: var(--fs-xs);
    color: var(--text-3);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: var(--s2);
    margin-top: var(--s4);
    transition: color var(--transition);
  }
  .raw-toggle:hover { color: var(--text-2); }
  .raw-box {
    margin-top: var(--s3);
    padding: var(--s4);
    background: var(--bg-inset);
    border-radius: var(--r1);
    font-family: var(--mono);
    font-size: var(--fs-xs);
    color: var(--text-3);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 300px;
    overflow-y: auto;
  }

  /* --- Chroma Memory --- */
  .chroma-cat {
    font-size: var(--fs-xs);
    font-weight: 600;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-top: var(--s4);
    margin-bottom: var(--s2);
  }
  .chroma-entry {
    padding: var(--s3) 0;
    border-bottom: 1px solid var(--border);
    font-size: var(--fs-sm);
    color: var(--text);
    overflow-wrap: break-word;
  }
  .chroma-entry:last-child { border-bottom: none; }

  /* --- Command Card --- */
  .cmd-row {
    display: flex;
    align-items: center;
    gap: var(--s3);
    padding: var(--s3) 0;
    border-bottom: 1px solid var(--border);
  }
  .cmd-row:last-child { border-bottom: none; }
  .cmd-name {
    font-family: var(--mono);
    font-size: var(--fs-sm);
    font-weight: 600;
    color: var(--accent);
    min-width: 100px;
  }
  .cmd-desc {
    font-size: var(--fs-sm);
    color: var(--text-2);
  }

  /* --- Empty --- */
  .empty {
    font-size: var(--fs-sm);
    color: var(--text-3);
    font-style: italic;
  }

  /* --- Footer --- */
  .footer {
    text-align: left;
    font-size: var(--fs-xs);
    color: var(--text-3);
    margin-top: var(--s8);
    padding: var(--s4) 0;
    border-top: 1px solid var(--border);
  }

  /* --- Scrollbar --- */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
</style>
</head>
<body>

<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <img src="logo.png" alt="Hermes">
      <h1>Hermes</h1>
    </div>
    <div class="status-row" id="status-bar"></div>
  </div>

  <!-- Bento Grid -->
  <div class="bento">

    <!-- Quick Commands -->
    <div class="card col-2">
      <div class="card-h">
        <i data-lucide="terminal"></i>
        <h2>Quick Commands</h2>
      </div>
      <div id="commands"></div>
    </div>

    <!-- Config -->
    <div class="card col-2">
      <div class="card-h">
        <i data-lucide="settings"></i>
        <h2>Config</h2>
      </div>
      <div id="config"></div>
      <details>
        <summary class="raw-toggle">
          <i data-lucide="chevron-right" style="width:14px;height:14px"></i>
          config.yaml
        </summary>
        <div class="raw-box" id="config-raw"></div>
      </details>
      <details>
        <summary class="raw-toggle">
          <i data-lucide="chevron-right" style="width:14px;height:14px"></i>
          .env
        </summary>
        <div class="raw-box" id="config-env"></div>
      </details>
    </div>

    <!-- Tasks -->
    <div class="card col-2">
      <div class="card-h">
        <i data-lucide="check-circle-2"></i>
        <h2>Tasks</h2>
        <span class="count" id="task-count">0</span>
      </div>
      <div id="tasks"></div>
    </div>

    <!-- Memory Usage -->
    <div class="card col-1">
      <div class="card-h">
        <i data-lucide="user"></i>
        <h2>User Memory</h2>
      </div>
      <div id="user-stat"></div>
    </div>

    <div class="card col-1">
      <div class="card-h">
        <i data-lucide="brain"></i>
        <h2>Agent Memory</h2>
      </div>
      <div id="agent-stat"></div>
    </div>

    <!-- Cron Jobs -->
    <div class="card col-2">
      <div class="card-h">
        <i data-lucide="clock"></i>
        <h2>Scheduled Jobs</h2>
        <span class="count" id="cron-count">0</span>
      </div>
      <div id="cron-jobs"></div>
    </div>

    <!-- Long-Term Memory -->
    <div class="card col-2">
      <div class="card-h">
        <i data-lucide="database"></i>
        <h2>Long-Term Memory</h2>
        <span class="count" id="chroma-count">0</span>
      </div>
      <div id="chroma-memories"></div>
    </div>

    <!-- Who You Are -->
    <div class="card col-2">
      <div class="card-h">
        <i data-lucide="user-circle"></i>
        <h2>Who You Are</h2>
        <span class="count" id="user-label">USER.md</span>
      </div>
      <div id="user-memory"></div>
    </div>

    <!-- My Notes -->
    <div class="card col-2">
      <div class="card-h">
        <i data-lucide="notebook-pen"></i>
        <h2>My Notes</h2>
        <span class="count" id="agent-label">MEMORY.md</span>
      </div>
      <div id="agent-memory"></div>
    </div>

    <!-- Skills -->
    <div class="card col-2">
      <div class="card-h">
        <i data-lucide="puzzle"></i>
        <h2>Skills</h2>
        <span class="count" id="skill-count">0</span>
      </div>
      <div id="skills"></div>
      <div class="skill-detail" id="skill-detail"></div>
    </div>

  </div>

  <div class="footer" id="footer">~/.hermes</div>

</div>

<script src="data.js"></script>
<script>
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function cronHuman(c) {
  if (!c) return '?';
  const p = c.trim().split(/\s+/);
  if (p.length !== 5) return c;
  const [min,hr] = p;
  const days = {0:'Sun',1:'Mon',2:'Tue',3:'Wed',4:'Thu',5:'Fri',6:'Sat'};
  const h = +hr, m = +min;
  const t = `${h > 12 ? h-12 : h||12}:${String(m).padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
  if (p[2]==='*' && p[3]==='*' && p[4]==='*') return `Daily at ${t}`;
  if (p[2]==='*' && p[3]==='*' && p[4]!=='*') return `Every ${days[p[4]]||p[4]} at ${t}`;
  return c;
}

function renderStatus(html) {
  const el = document.getElementById('status-bar');
  if (!html) return;
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const items = doc.querySelectorAll('.config-item');
  let out = '';
  items.forEach(item => {
    const k = item.querySelector('.config-key')?.textContent || '';
    const v = item.querySelector('.config-val')?.textContent || '';
    const on = v.includes('Online') || v.includes('\u2713');
    out += `<div class="status-item"><span class="dot ${on?'on':'off'}"></span>${k}</div>`;
  });
  el.innerHTML = out;
}

function renderUsageStat(id, chars, limit, pct) {
  const el = document.getElementById(id);
  if (!el) return;
  const cls = pct < 60 ? 'ok' : pct < 85 ? 'warn' : 'danger';
  el.innerHTML = `
    <div class="stat-val">${pct}<span style="font-size:var(--fs-xl);color:var(--text-3)">%</span></div>
    <div class="stat-label">${chars} / ${limit} chars</div>
    <div class="usage-bar"><div class="usage-fill ${cls}" style="width:${Math.min(pct,100)}%"></div></div>`;
}

function renderMemory(text, id) {
  const el = document.getElementById(id);
  if (!text || !text.trim()) { el.innerHTML = '<div class="empty">No entries</div>'; return; }
  const entries = text.split('\n\u00a7\n').filter(e => e.trim());
  el.innerHTML = entries.map(e => {
    const lines = e.trim().split('\n');
    const m = lines[0].match(/^\*\*(.+?):\*\*\s*(.*)/);
    if (m) {
      return `<div class="mem-entry"><div class="mem-label">${m[1]}</div><div>${m[2]}${lines.length > 1 ? '<br>' + lines.slice(1).join('<br>') : ''}</div></div>`;
    }
    return `<div class="mem-entry">${e.trim()}</div>`;
  }).join('');
}

function renderTasks(tasks) {
  const el = document.getElementById('tasks');
  const counter = document.getElementById('task-count');
  if (!tasks || !tasks.length) {
    el.innerHTML = '<div class="empty">All clear</div>';
    counter.textContent = '0';
    return;
  }
  const open = tasks.filter(t => !t.done);
  const done = tasks.filter(t => t.done);
  counter.textContent = open.length;
  el.innerHTML = [...open, ...done].map(t => {
    const cls = t.done ? 'task done' : 'task';
    const check = t.done ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent-dim)"><polyline points="20 6 9 17 4 12"></polyline></svg>' : '';
    const pri = t.priority ? `<span class="task-pri ${t.priority}">${t.priority}</span>` : '';
    return `<div class="${cls}">
      <div class="task-check">${check}</div>
      <span class="task-text">${esc(t.task)}</span>
      ${pri}
      <span class="task-date">${t.added || ''}</span>
    </div>`;
  }).join('');
}

function renderCron(jobs) {
  const el = document.getElementById('cron-jobs');
  const counter = document.getElementById('cron-count');
  if (!jobs || !jobs.length) {
    el.innerHTML = '<div class="empty">No jobs</div>';
    counter.textContent = '0';
    return;
  }
  counter.textContent = jobs.length;
  el.innerHTML = jobs.map(j => {
    const next = j.next_run_at ? new Date(j.next_run_at).toLocaleString() : '';
    const sched = cronHuman(j.schedule);
    const enabled = j.enabled !== false;
    return `<div class="cron">
      <div class="cron-top">
        <span class="dot ${enabled?'on':'off'}"></span>
        <span class="cron-name">${j.name || j.job_id || j.id || 'Unnamed'}</span>
        <span class="tag tag-accent">${sched}</span>
        <span class="tag">${j.deliver || 'local'}</span>
        ${j.skills ? j.skills.map(s => `<span class="tag">${s}</span>`).join('') : ''}
      </div>
      ${next ? `<div class="cron-meta">Next: ${next}</div>` : ''}
      ${j.prompt ? `<details><summary class="cron-prompt"><i data-lucide="chevron-right" style="width:12px;height:12px"></i>Prompt</summary><div class="cron-prompt-box">${esc(j.prompt)}</div></details>` : ''}
    </div>`;
  }).join('');
}

function renderConfig(html) {
  const el = document.getElementById('config');
  if (!html) return;
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const items = doc.querySelectorAll('.config-item');
  let out = '';
  items.forEach(item => {
    const k = item.querySelector('.config-key')?.textContent || '';
    const v = item.querySelector('.config-val')?.textContent || '';
    out += `<div class="cfg-row"><span class="cfg-key">${k}</span><span class="cfg-val">${v}</span></div>`;
  });
  el.innerHTML = out;
}

function renderSkills() {
  const el = document.getElementById('skills');
  const counter = document.getElementById('skill-count');
  const d = window.__DASHBOARD_DATA__;
  if (!d || !d.skills_data || !d.skills_data.length) {
    el.innerHTML = '<div class="empty">No skills</div>';
    counter.textContent = '0';
    return;
  }
  counter.textContent = d.skills_data.length;
  const cats = {};
  d.skills_data.forEach(s => {
    if (!cats[s.category]) cats[s.category] = [];
    cats[s.category].push(s);
  });
  let out = '';
  Object.keys(cats).sort().forEach(cat => {
    out += `<div class="skill-cat"><div class="skill-cat-name">${cat}</div><div class="skill-pills">`;
    cats[cat].forEach(s => {
      const cls = s.custom ? 'pill custom' : 'pill';
      out += `<span class="${cls}" onclick="showSkill('${s.path}',this)">${s.name}</span>`;
    });
    out += '</div></div>';
  });
  el.innerHTML = out;
}

function showSkill(path, pill) {
  const d = window.__DASHBOARD_DATA__;
  if (!d || !d.skills_data) return;
  const s = d.skills_data.find(x => x.path === path);
  const detail = document.getElementById('skill-detail');
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  if (s) {
    if (pill) pill.classList.add('active');
    detail.textContent = s.content;
    detail.classList.add('show');
  }
}

function renderChroma(data) {
  const el = document.getElementById('chroma-memories');
  const counter = document.getElementById('chroma-count');
  if (!data || !data.memories || !data.memories.length) {
    el.innerHTML = '<div class="empty">No memories</div>';
    counter.textContent = '0';
    return;
  }
  counter.textContent = data.count;
  const cats = {};
  data.memories.forEach(m => {
    const c = m.category || 'general';
    if (!cats[c]) cats[c] = [];
    cats[c].push(m);
  });
  let html = '';
  Object.keys(cats).sort().forEach(cat => {
    html += `<div class="chroma-cat">${cat}</div>`;
    cats[cat].forEach(m => {
      html += `<div class="chroma-entry">${esc(m.text)}</div>`;
    });
  });
  el.innerHTML = html;
}

function renderCommands(cmds) {
  const el = document.getElementById('commands');
  if (!cmds || !cmds.length) { el.innerHTML = '<div class="empty">No commands</div>'; return; }
  el.innerHTML = cmds.map(c =>
    `<div class="cmd-row"><span class="cmd-name">${esc(c.cmd)}</span><span class="cmd-desc">${esc(c.desc)}</span></div>`
  ).join('');
}

function loadAll() {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  renderStatus(d.status);
  renderTasks(d.tasks);
  renderUsageStat('user-stat', d.user_chars, d.user_limit, d.user_pct);
  renderUsageStat('agent-stat', d.agent_chars, d.agent_limit, d.agent_pct);
  renderMemory(d.user_memory, 'user-memory');
  renderMemory(d.agent_memory, 'agent-memory');
  renderCron(d.cron_jobs);
  renderCommands(d.commands);
  renderConfig(d.config);
  renderSkills();
  renderChroma(d.chroma);
  if (d.config_raw) document.getElementById('config-raw').textContent = d.config_raw;
  if (d.env_raw) document.getElementById('config-env').textContent = d.env_raw;
  lucide.createIcons();
}

document.addEventListener('DOMContentLoaded', loadAll);
</script>
</body>
</html>
