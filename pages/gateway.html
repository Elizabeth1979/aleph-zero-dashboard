<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gateway — Hermes</title>
<link rel="stylesheet" href="../theme.css?v=3">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="../a11y-widget.css">
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <h1 class="page-title"><i data-lucide="radio"></i> Gateway</h1>
  </div>
  <div class="page-body" id="page-body"></div>
</div>
<script src="utils.js"></script>
<script src="../data.js"></script>
<script>

document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  let html = '';
  if (d.status) {
    const doc = new DOMParser().parseFromString(d.status, 'text/html');
    doc.querySelectorAll('.config-item').forEach(item => {
      const k = item.querySelector('.config-key')?.textContent || '';
      const v = item.querySelector('.config-val')?.textContent || '';
      const on = v.includes('Online') || v.includes('\u2713');
      html += `<div class="cfg-row"><span class="cfg-key">${esc(k)}</span><span class="cfg-val" style="color:${on ? 'var(--ok)' : 'var(--text-3)'}">${esc(v)}</span></div>`;
    });
  }
  // Restart button
  html += `<div style="margin-top:24px;display:flex;gap:12px;align-items:center">
    <button id="gw-restart-btn" onclick="restartGateway()" style="
      background:var(--accent);color:#0a0a0a;border:none;padding:12px 24px;
      border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;
    ">Restart Gateway</button>
    <span id="gw-restart-status" style="color:var(--text-3);font-size:14px"></span>
  </div>`;

  document.getElementById('page-body').innerHTML = html || '<div class="empty">No gateway info</div>';
  if (typeof lucide !== 'undefined') lucide.createIcons();
});

function restartGateway() {
  const btn = document.getElementById('gw-restart-btn');
  const status = document.getElementById('gw-restart-status');
  btn.disabled = true;
  btn.style.opacity = '0.5';
  status.textContent = 'Restarting...';
  fetch('http://localhost:7865/restart', { method: 'POST' })
    .then(r => r.text())
    .then(() => {
      status.textContent = '✓ Restarted — refreshing...';
      setTimeout(() => location.reload(), 2000);
    })
    .catch(() => {
      status.textContent = '✗ Health server not running. Use terminal: gw';
      btn.disabled = false;
      btn.style.opacity = '1';
    });
}

</script>
<script src="../a11y-widget.js"></script>
</body>
</html>
