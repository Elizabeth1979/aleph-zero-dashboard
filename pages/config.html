<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>Config — Hermes</title>
<link rel="stylesheet" href="../theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="../a11y-widget.css">
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <h1 class="page-title"><i data-lucide="settings"></i> Config & Setup</h1>
  </div>
  <div class="page-body" id="page-body"></div>
  <div class="page-footer">built with ❤️ by e11i</div>
</div>
<script src="utils.js?v=5"></script>
<script src="../data.js"></script>
<script>

document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  let html = '';

  // ── Models & Settings ──
  html += '<div class="section-head"><i data-lucide="cpu"></i> Models & Settings</div>';
  if (d.config) {
    const doc = new DOMParser().parseFromString(d.config, 'text/html');
    doc.querySelectorAll('.config-item').forEach(item => {
      const k = item.querySelector('.config-key')?.textContent || '';
      const v = item.querySelector('.config-val')?.textContent || '';
      html += `<div class="cfg-row"><span class="cfg-key">${esc(k)}</span><span class="cfg-val">${esc(v)}</span></div>`;
    });
  }

  // ── Quick Commands ──
  const cmds = d.commands || [];
  if (cmds.length) {
    html += '<div class="section-head"><i data-lucide="terminal"></i> Quick Commands</div>';
    cmds.forEach(c => {
      html += `<div class="cmd-row"><span class="cmd-name">${esc(c.cmd)}</span><span class="cmd-desc">${esc(c.desc)}</span></div>`;
    });
  }

  // ── Credentials ──
  const auth = d.auth_data || [];
  if (auth.length) {
    html += '<div class="section-head"><i data-lucide="key-round"></i> Credentials</div>';
    auth.forEach(a => {
      html += `<div class="cfg-row"><span class="cfg-key" style="font-weight:600;color:var(--accent)">${esc(a.name)}</span><span class="cfg-val">${a.count} credential(s)</span></div>`;
      a.labels.forEach(l => {
        html += `<div class="cfg-row"><span class="cfg-key" style="padding-left:var(--s4)">&rarr; ${esc(l)}</span><span class="cfg-val" style="color:var(--ok)">active</span></div>`;
      });
    });
  }

  // ── Google Integration ──
  html += '<div class="section-head"><i data-lucide="mail"></i> Google Integration</div>';
  html += `<div class="cfg-row"><span class="cfg-key">OAuth Token</span><span class="cfg-val" style="color:${d.google_status === 'connected' ? 'var(--ok)' : 'var(--text-3)'}">${d.google_status === 'connected' ? '\u2713 Connected' : '\u2717 Not connected'}</span></div>`;
  html += `<div class="cfg-row"><span class="cfg-key">Client Secret</span><span class="cfg-val" style="color:${d.google_apis === 'configured' ? 'var(--ok)' : 'var(--text-3)'}">${d.google_apis === 'configured' ? '\u2713 Configured' : '\u2717 Not found'}</span></div>`;
  html += `<div style="margin-top:var(--s2);color:var(--text-3);font-size:var(--fs-xs)">APIs: Gmail, Calendar, Drive, YouTube</div>`;

  // ── Raw Files ──
  if (d.config_raw || d.env_raw) {
    html += '<div class="section-head"><i data-lucide="file-text"></i> Raw Files</div>';
    if (d.config_raw) {
      html += `<details><summary class="raw-toggle"><i data-lucide="chevron-right" style="width:14px;height:14px"></i> config.yaml</summary><div class="raw-box">${esc(d.config_raw)}</div></details>`;
    }
    if (d.env_raw) {
      html += `<details><summary class="raw-toggle"><i data-lucide="chevron-right" style="width:14px;height:14px"></i> .env</summary><div class="raw-box">${esc(d.env_raw)}</div></details>`;
    }
  }

  document.getElementById('page-body').innerHTML = html;
  // Accordion: only one details open at a time
  document.querySelectorAll('details').forEach(det => {
    det.addEventListener('toggle', () => {
      if (det.open) {
        document.querySelectorAll('details').forEach(other => {
          if (other !== det) other.removeAttribute('open');
        });
      }
    });
  });
  if (typeof lucide !== 'undefined') lucide.createIcons();
});

</script>
<link rel="stylesheet" href="../a11y-tester.css">
<script src="../a11y-widget.js"></script>
<script src="../a11y-tester.js"></script>
</body>
</html>
