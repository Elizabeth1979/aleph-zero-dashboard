document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  if (!d.soul_md) { document.getElementById('page-body').innerHTML = '<div class="empty">No SOUL.md found</div>'; return; }

  const chars = d.soul_md.length;
  document.getElementById('page-body').innerHTML = `
    <div class="modal-meta">SOUL.md &bull; ${chars} chars &bull; My personality, vibe, and core rules</div>
    <div class="modal-editor rendered-md" id="editor-soul">${renderMd(d.soul_md)}</div>
  `;
  if (typeof lucide !== 'undefined') lucide.createIcons();
});

</script>
