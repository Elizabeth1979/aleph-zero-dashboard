<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — Hermes</title>
<link rel="stylesheet" href="../theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="../a11y-widget.css">
<style>
  /* Project cards */
  .project-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: var(--s5);
    margin-bottom: var(--s5);
    transition: border-color var(--transition);
  }
  .project-card:hover {
    border-color: var(--border-hover);
  }

  /* Card header: name + status */
  .project-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--s3);
    margin-bottom: var(--s3);
  }
  .project-name {
    font-size: var(--fs-lg);
    font-weight: 600;
    color: var(--text);
  }
  .status-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.03em;
    padding: 2px 10px;
    border-radius: var(--pill);
    white-space: nowrap;
  }
  .status-badge.in_progress {
    background: rgba(93, 228, 212, 0.1);
    color: var(--accent);
    border: 1px solid rgba(93, 228, 212, 0.2);
  }
  .status-badge.done {
    background: rgba(93, 228, 212, 0.15);
    color: var(--ok);
    border: 1px solid rgba(93, 228, 212, 0.3);
  }
  .status-badge.paused {
    background: rgba(240, 184, 102, 0.1);
    color: var(--warn);
    border: 1px solid rgba(240, 184, 102, 0.2);
  }

  /* Description */
  .project-desc {
    font-size: var(--fs-sm);
    color: var(--text-3);
    line-height: 1.5;
    margin-bottom: var(--s4);
  }

  /* Meta row: date, repo, notes */
  .project-meta {
    display: flex;
    flex-wrap: wrap;
    gap: var(--s3) var(--s5);
    font-size: var(--fs-xs);
    color: var(--text-3);
    margin-bottom: var(--s4);
  }
  .meta-item {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .meta-item svg { color: var(--text-3); }

  /* Links row */
  .project-links {
    display: flex;
    flex-wrap: wrap;
    gap: var(--s3);
    margin-bottom: var(--s4);
  }
  .project-link {
    font-size: var(--fs-xs);
    color: var(--accent);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: var(--pill);
    background: var(--accent-muted);
    transition: background var(--transition);
  }
  .project-link:hover {
    background: rgba(93, 228, 212, 0.2);
  }

  /* Section divider inside card */
  .card-section {
    border-top: 1px solid var(--border);
    padding-top: var(--s4);
    margin-top: var(--s4);
  }
  .card-section-title {
    font-size: var(--fs-xs);
    font-weight: 600;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: var(--s3);
  }

  /* Progress bar */
  .progress-row {
    display: flex;
    align-items: center;
    gap: var(--s3);
    margin-bottom: var(--s3);
  }
  .progress-bar {
    flex: 1;
    height: 4px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: var(--pill);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent-dim);
    border-radius: var(--pill);
    transition: width 0.3s ease;
  }
  .progress-pct {
    font-size: var(--fs-xs);
    color: var(--text-3);
    white-space: nowrap;
  }

  /* Task table */
  .task-table {
    width: 100%;
    border-collapse: collapse;
    font-size: var(--fs-sm);
  }
  .task-table th {
    text-align: left;
    font-size: var(--fs-xs);
    font-weight: 600;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
  }
  .task-table td {
    padding: 8px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    vertical-align: top;
  }
  .task-table tr:last-child td { border-bottom: none; }
  .task-table-text { color: var(--text); line-height: 1.4; }
  .task-table-desc { font-size: var(--fs-xs); color: var(--text-3); line-height: 1.4; margin-top: 2px; }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.03em;
    padding: 2px 8px;
    border-radius: var(--pill);
    white-space: nowrap;
  }
  .badge.easy { color: var(--accent); background: var(--accent-muted); }
  .badge.medium { color: var(--warn); background: rgba(240, 184, 102, 0.12); }
  .badge.hard { color: #c084fc; background: rgba(192, 132, 252, 0.12); }
  .badge.impact-high { color: #f87171; background: rgba(248, 113, 113, 0.12); }
  .badge.impact-medium { color: var(--warn); background: rgba(240, 184, 102, 0.12); }
  .badge.impact-low { color: var(--text-3); background: rgba(255,255,255,0.06); }

  /* Score cell: stacked badges */
  .score-cell { display: flex; flex-direction: column; gap: 3px; align-items: flex-start; }

  /* Features list */
  .feature-list { list-style: none; padding: 0; margin: 0; }
  .feature-list li {
    display: flex; align-items: flex-start; gap: var(--s2);
    padding: 4px 0; font-size: var(--fs-sm); color: var(--text-2); line-height: 1.4;
  }
  .feature-list li::before {
    content: ''; display: inline-block; flex-shrink: 0;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent-dim); margin-top: 6px;
  }

  /* Completed toggle */
  .completed-toggle {
    display: flex; align-items: center; gap: var(--s2);
    font-size: var(--fs-xs); color: var(--text-3);
    cursor: pointer; padding: var(--s2) 0; margin-top: var(--s3);
    border: none; background: none; font-family: inherit;
  }
  .completed-toggle:hover { color: var(--text-2); }
  .completed-toggle svg {
    width: 12px; height: 12px; transition: transform 0.2s ease;
  }
  .completed-toggle.open svg { transform: rotate(90deg); }
  .completed-list { display: none; }
  .completed-list.open { display: block; }
  .completed-item {
    display: flex; align-items: flex-start; gap: var(--s2);
    padding: 3px 0; font-size: var(--fs-xs); color: var(--text-3);
    text-decoration: line-through; line-height: 1.4;
  }
  .completed-item::before {
    content: '✓'; flex-shrink: 0; color: var(--accent-dim);
    font-size: 11px; margin-top: 1px;
  }

  /* Checklist items (milestones + tasks) */
  .checklist-item {
    display: flex;
    align-items: flex-start;
    gap: var(--s2);
    padding: 5px 0;
    font-size: var(--fs-sm);
    color: var(--text-2);
  }
  .checklist-item.is-done {
    color: var(--text-3);
  }
  .checklist-item.is-done .checklist-text {
    text-decoration: line-through;
    text-decoration-color: var(--text-3);
  }
  .checklist-icon {
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }
  /* Pending circle */
  .checklist-icon.pending {
    width: 14px;
    height: 14px;
    border: 2px solid var(--text-3);
    border-radius: 50%;
    margin: 2px 2px 0 2px;
  }
  /* Done checkmark */
  .checklist-icon.done {
    color: var(--accent-dim);
  }
</style>
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <h1 class="page-title"><i data-lucide="rocket"></i> Projects</h1>
  </div>
  <div class="page-body" id="page-body"></div>
</div>
<script src="utils.js"></script>
<script src="../data.js"></script>
<script>

document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  const projects = d.projects || [];
  const allTasks = (d.tasks || []).filter(t => t.category === 'project');
  if (!projects.length) {
    document.getElementById('page-body').innerHTML = '<div class="empty">No projects yet — get building!</div>';
    return;
  }

  const statusLabel = { in_progress: 'In Progress', done: 'Done', paused: 'Paused' };

  const checkSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

  function renderChecklist(items, isDone) {
    return items.map(item => {
      const text = typeof item === 'string' ? item : item.task || item.text || '';
      const done = typeof item === 'object' ? item.done : isDone;
      const cls = done ? 'checklist-item is-done' : 'checklist-item';
      const icon = done
        ? `<div class="checklist-icon done">${checkSvg}</div>`
        : `<div class="checklist-icon pending"></div>`;
      return `<div class="${cls}">${icon}<span class="checklist-text">${esc(text)}</span></div>`;
    }).join('');
  }

  function renderProject(p) {
    const status = p.status || 'in_progress';
    const badge = `<span class="status-badge ${status}">${statusLabel[status] || status}</span>`;
    const desc = p.description ? `<div class="project-desc">${esc(p.description)}</div>` : '';

    // Meta
    const metaItems = [];
    if (p.started) {
      metaItems.push(`<span class="meta-item"><i data-lucide="calendar" style="width:13px;height:13px"></i>${esc(p.started)}</span>`);
    }
    if (p.repo) {
      metaItems.push(`<span class="meta-item"><i data-lucide="folder" style="width:13px;height:13px"></i>${esc(p.repo)}</span>`);
    }
    const metaHtml = metaItems.length ? `<div class="project-meta">${metaItems.join('')}</div>` : '';

    // Links
    const links = (p.links || []).filter(l => l.url);
    const linksHtml = links.length ? `<div class="project-links">${links.map(l =>
      `<a href="${esc(l.url)}" target="_blank" rel="noopener" class="project-link"><i data-lucide="external-link" style="width:11px;height:11px"></i>${esc(l.label)}</a>`
    ).join('')}</div>` : '';

    // Features section
    const features = p.features || [];
    let featuresHtml = '';
    if (features.length) {
      featuresHtml = `<div class="card-section">
        <div class="card-section-title">What's Working</div>
        <ul class="feature-list">${features.map(f => `<li>${esc(f)}</li>`).join('')}</ul>
      </div>`;
    }

    // Tasks from tasks.json — only open tasks in table, done tasks collapsed
    let tasksHtml = '';
    if (p.task_prefix) {
      const projectTasks = allTasks.filter(t => t.task.startsWith(p.task_prefix));
      if (projectTasks.length) {
        const pending = projectTasks.filter(t => !t.done);
        const done = projectTasks.filter(t => t.done);

        // Sort pending: high impact + easy difficulty first (low-hanging fruit)
        const impactOrder = { high: 0, medium: 1, low: 2 };
        const diffOrder = { easy: 0, medium: 1, hard: 2 };
        pending.sort((a, b) => {
          const scoreA = (impactOrder[a.impact] || 1) + (diffOrder[a.difficulty] || 1);
          const scoreB = (impactOrder[b.impact] || 1) + (diffOrder[b.difficulty] || 1);
          return scoreA - scoreB;
        });

        const rows = pending.map(t => {
          const text = t.task.replace(p.task_prefix, '').replace(/^\s*—?\s*/, '').trim() || t.task;
          const taskDesc = t.description ? `<div class="task-table-desc">${esc(t.description)}</div>` : '';
          const diff = t.difficulty || '';
          const impact = t.impact || '';
          const diffBadge = diff ? `<span class="badge ${diff}">${diff}</span>` : '';
          const impactBadge = impact ? `<span class="badge impact-${impact}">${impact} impact</span>` : '';
          return `<tr>
            <td><div class="task-table-text">${esc(text)}</div>${taskDesc}</td>
            <td><div class="score-cell">${diffBadge}${impactBadge}</div></td>
          </tr>`;
        }).join('');

        // Completed tasks — collapsible
        let completedHtml = '';
        if (done.length) {
          const pid = p.id.replace(/[^a-z0-9]/g, '');
          const doneItems = done.map(t => {
            const text = t.task.replace(p.task_prefix, '').replace(/^\s*—?\s*/, '').trim() || t.task;
            return `<div class="completed-item">${esc(text)}</div>`;
          }).join('');
          completedHtml = `
            <button class="completed-toggle" onclick="this.classList.toggle('open');document.getElementById('done-${pid}').classList.toggle('open')" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
              ${done.length} completed
            </button>
            <div class="completed-list" id="done-${pid}">${doneItems}</div>`;
        }

        tasksHtml = `<div class="card-section">
          <div class="card-section-title">To Do</div>
          ${pending.length ? `<table class="task-table">
            <thead><tr><th>Task</th><th>Score</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>` : '<div style="font-size:var(--fs-sm);color:var(--text-3)">All done!</div>'}
          ${completedHtml}
        </div>`;
      }
    }

    return `<div class="project-card">
      <div class="project-header">
        <span class="project-name">${esc(p.name || p.id)}</span>
        ${badge}
      </div>
      ${desc}
      ${metaHtml}
      ${linksHtml}
      ${featuresHtml}
      ${tasksHtml}
    </div>`;
  }

  // Sort: in_progress first, then paused, then done
  const order = { in_progress: 0, paused: 1, done: 2 };
  const sorted = [...projects].sort((a, b) => {
    return (order[a.status] ?? 1) - (order[b.status] ?? 1);
  });

  document.getElementById('page-body').innerHTML = sorted.map(renderProject).join('');
  if (typeof lucide !== 'undefined') lucide.createIcons();
});
</script>
<link rel="stylesheet" href="../a11y-tester.css">
<script src="../a11y-widget.js"></script>
<script src="../a11y-tester.js"></script>
</body>
</html>
