<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Memory — Hermes</title>
<link rel="stylesheet" href="../theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="../a11y-widget.css">
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <h1 class="page-title"><i data-lucide="brain"></i> Agent Memory</h1>
  </div>
  <div class="page-body" id="page-body"></div>
</div>
<script src="utils.js?v=5"></script>
<script src="../data.js"></script>
<script>

document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  const text = d.agent_memory || '';
  const chars = d.agent_chars;
  const limit = d.agent_limit;
  const pct = d.agent_pct;
  const mf = d.memory_files || {};
  const detailFiles = [
    { key: 'discord', name: 'discord.md', icon: 'message-circle', label: 'Discord' },
    { key: 'dashboard', name: 'dashboard.md', icon: 'layout-dashboard', label: 'Dashboard' },
    { key: 'google', name: 'google.md', icon: 'mail', label: 'Google Workspace' },
    { key: 'github', name: 'github.md', icon: 'github', label: 'GitHub' },
    { key: 'behavior', name: 'behavior.md', icon: 'shield', label: 'Behavior Rules' },
    { key: 'accessibility', name: 'accessibility.md', icon: 'eye', label: 'Accessibility' },
    { key: 'web_best_practices', name: 'web-best-practices.md', icon: 'globe', label: 'Web Best Practices' },
  ];
  const detailHtml = detailFiles.filter(f => mf[f.key]).map(f => {
    const content = mf[f.key];
    const bytes = new Blob([content]).size;
    return `<div class="detail-file" data-file="${f.key}">
      <div class="detail-header" onclick="toggleDetail(this.parentElement)">
        <i data-lucide="chevron-right" class="detail-chevron"></i>
        <span class="detail-name"><i data-lucide="${f.icon}" style="width:14px;height:14px"></i> ${f.label}</span>
        <span class="detail-size">${bytes} chars</span>
      </div>
      <div class="detail-content">${renderMd(content)}</div>
    </div>`;
  }).join('');

  document.getElementById('page-body').innerHTML = `
    <div class="modal-meta">MEMORY.md &bull; ${chars} / ${limit} chars (${pct}%)</div>
    <div class="usage-bar" style="margin-bottom:var(--s4)"><div class="usage-fill ${pct < 60 ? 'ok' : pct < 85 ? 'warn' : 'danger'}" style="width:${Math.min(pct,100)}%"></div></div>
    <div class="modal-editor rendered-md" id="editor-agent">${renderMd(text)}</div>
    <div class="detail-section">
      <div class="detail-title"><i data-lucide="folder-open"></i> Detail Files</div>
      ${detailHtml || '<div class="empty">No detail files found</div>'}
    </div>`;
  if (typeof lucide !== 'undefined') lucide.createIcons();
});
function toggleDetail(el) {
  const wasOpen = el.classList.contains('open');
  document.querySelectorAll('.detail-file.open').forEach(f => f.classList.remove('open'));
  if (!wasOpen) el.classList.add('open');
}
// Handle clicks on detail-file links in the rendered markdown
document.addEventListener('click', (e) => {
  const link = e.target.closest('a.file-link[data-detail]');
  if (!link) return;
  e.preventDefault();
  const key = link.dataset.detail;
  const el = document.querySelector(`.detail-file[data-file="${key}"]`);
  if (el) {
    document.querySelectorAll('.detail-file.open').forEach(f => f.classList.remove('open'));
    el.classList.add('open');
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
});

</script>
<script src="../a11y-widget.js"></script>
</body>
</html>
