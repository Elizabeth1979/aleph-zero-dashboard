<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>Dashboard Internals — Hermes</title>
<link rel="stylesheet" href="../theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="../a11y-widget.css">
<style>
.quick-links { display:flex; flex-wrap:wrap; gap:var(--s3); margin-top:var(--s3); }
.quick-link { display:inline-flex; align-items:center; gap:8px; color:var(--accent); text-decoration:none; font-size:var(--fs-sm); }
.canvas-note { color:var(--text-3); font-size:var(--fs-xs); margin-top:var(--s2); }
.map-wrap { margin-top:var(--s4); overflow:auto; padding-bottom:var(--s2); }
.excalimap {
  position: relative;
  min-width: 1320px;
  min-height: 860px;
  background:
    radial-gradient(circle at 1px 1px, rgba(255,255,255,0.05) 1px, transparent 0);
  background-size: 24px 24px;
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: var(--s4);
}
.excalimap svg {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
}
.node {
  position:absolute;
  width: 230px;
  min-height: 86px;
  background: rgba(19, 27, 37, 0.92);
  border: 2px solid rgba(93,228,212,0.42);
  border-radius: 18px 15px 16px 17px;
  box-shadow: 2px 3px 0 rgba(93,228,212,0.12), 0 10px 30px rgba(0,0,0,0.22);
  padding: 14px 16px;
  transform: rotate(var(--rot, -0.6deg));
}
.node h3 { margin:0 0 6px; font-size:var(--fs-sm); color:var(--accent); }
.node p { margin:0; font-size:var(--fs-sm); color:var(--text-3); line-height:1.45; }
.node.clickable {
  cursor:pointer;
  transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
}
.node.clickable:hover {
  border-color: var(--accent);
  box-shadow: 3px 4px 0 rgba(93,228,212,0.18), 0 16px 34px rgba(0,0,0,0.28);
  transform: rotate(var(--rot, -0.6deg)) translateY(-2px);
}
.badge-mini {
  display:inline-block;
  margin-top:8px;
  font-size:11px;
  color:var(--text-2);
  border:1px dashed rgba(93,228,212,0.42);
  border-radius:999px;
  padding:2px 8px;
}
.legend {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:var(--s3);
  margin-top:var(--s4);
}
.legend-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r2); padding:var(--s4); }
.legend-card strong { display:block; margin-bottom:6px; color:var(--text); }
.legend-card span { color:var(--text-3); font-size:var(--fs-sm); }
.link-list { display:grid; gap:var(--s2); margin-top:var(--s3); }
.link-row { display:flex; justify-content:space-between; gap:var(--s3); padding:var(--s2) 0; border-bottom:1px solid var(--border); }
.link-row:last-child { border-bottom:none; }
.link-name { font-family:var(--mono); color:var(--accent); font-size:var(--fs-sm); }
.link-desc { color:var(--text-3); font-size:var(--fs-sm); text-align:right; }
.prompt-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); z-index:1000; display:flex; align-items:center; justify-content:center; padding:var(--s6); opacity:0; visibility:hidden; transition:opacity .2s ease, visibility .2s ease; }
.prompt-overlay.open { opacity:1; visibility:visible; }
.prompt-modal { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r2); padding:var(--s5); max-width:860px; width:100%; max-height:85vh; overflow-y:auto; display:flex; flex-direction:column; gap:var(--s3); transform:translateY(8px); transition:transform .2s ease; }
.prompt-overlay.open .prompt-modal { transform:translateY(0); }
.prompt-modal-header { display:flex; align-items:center; justify-content:space-between; gap:var(--s3); }
.prompt-modal-header h2 { font-size:var(--fs-sm); font-weight:600; color:var(--text); margin:0; }
.prompt-modal-close { background:none; border:none; color:var(--text-3); cursor:pointer; padding:4px; border-radius:4px; display:flex; align-items:center; }
.prompt-modal-close:hover { color:var(--text); }
.prompt-modal-body { font-size:var(--fs-sm); color:var(--text-2); word-break:break-word; line-height:1.6; padding:var(--s4); background:var(--bg-inset); border-radius:var(--r1); }
.prompt-modal-body pre.code-block { background:rgba(0,0,0,0.3); padding:var(--s3); border-radius:var(--r1); overflow-x:auto; margin:0; }
.prompt-modal-body code { font-family:var(--mono); font-size:.9em; }
</style>
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <h1 class="page-title"><i data-lucide="workflow"></i> Dashboard Internals</h1>
  </div>
  <div class="page-body" id="page-body"></div>
  <div class="page-footer">built with ❤️ by e11i</div>
</div>
<div class="prompt-overlay" id="file-overlay" aria-hidden="true">
  <div class="prompt-modal" role="dialog" aria-modal="true" aria-labelledby="file-modal-title">
    <div class="prompt-modal-header">
      <h2 id="file-modal-title">File</h2>
      <button class="prompt-modal-close" id="file-modal-close" aria-label="Close file modal">
        <i data-lucide="x" style="width:18px;height:18px"></i>
      </button>
    </div>
    <div class="prompt-modal-body" id="file-modal-body"></div>
  </div>
</div>
<script src="utils.js"></script>
<script src="../data.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  const files = d.dashboard_files || [];
  const fileByName = Object.fromEntries(files.map((f, i) => [f.file, { ...f, index: i }]));
  const body = document.getElementById('page-body');
  const overlay = document.getElementById('file-overlay');
  const modalTitle = document.getElementById('file-modal-title');
  const modalBody = document.getElementById('file-modal-body');
  const closeBtn = document.getElementById('file-modal-close');

  const nodes = [
    { key:'commands.json', x:40, y:110, rot:'-0.9deg', title:'commands.json', desc:'Quick Commands shown in Config & Setup' },
    { key:'tasks.json', x:40, y:270, rot:'0.8deg', title:'tasks.json', desc:'Tasks page + home card counts' },
    { key:'projects.json', x:40, y:430, rot:'-0.7deg', title:'projects.json', desc:'Projects page + dashboard progress' },
    { key:'resources.json', x:40, y:590, rot:'0.6deg', title:'resources.json', desc:'Saved links and resources page' },

    { key:'refresh.sh', x:320, y:170, rot:'-0.6deg', title:'refresh.sh', desc:'Reads sources and rebuilds data.js' },
    { key:'validate_dashboard.py', x:320, y:380, rot:'0.7deg', title:'validate_dashboard.py', desc:'Checks loop integrity before publish' },
    { key:'dashboard_checklist.json', x:320, y:590, rot:'-0.8deg', title:'dashboard_checklist.json', desc:'Definition of done for dashboard changes' },

    { key:'data.js', x:610, y:300, rot:'-0.4deg', title:'data.js', desc:'Single bundle used by the dashboard pages', clickable:false },

    { key:'config.html', x:900, y:120, rot:'-0.7deg', title:'config.html', desc:'User-facing Config & Setup page', clickable:false },
    { key:'dashboard_internals.html', x:900, y:300, rot:'0.6deg', title:'dashboard_internals.html', desc:'This page: visual internals map', clickable:false },
    { key:'agent_map.html', x:900, y:480, rot:'-0.8deg', title:'agent_map.html', desc:'Big-picture Hermes visual map', clickable:false },

    { key:'publish.sh', x:1180, y:220, rot:'0.8deg', title:'publish.sh', desc:'Validate → refresh → commit → push' },
    { key:'update_tasks.sh', x:1180, y:420, rot:'-0.7deg', title:'update_tasks.sh', desc:'Publishes after task changes' }
  ];

  const line = (x1,y1,x2,y2, dashed=false) => `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="rgba(93,228,212,0.55)" stroke-width="2.5" stroke-dasharray="${dashed ? '8 8' : '0'}" stroke-linecap="round" marker-end="url(#arrow)" />`;

  let html = '';
  html += '<div class="section-head"><i data-lucide="info"></i> What this page is for</div>';
  html += '<div class="cfg-row"><span class="cfg-key">Purpose</span><span class="cfg-val">Excalidraw-style visual map of the dashboard internals. Click file nodes to open details.</span></div>';
  html += '<div class="quick-links">';
  html += '<a class="quick-link" href="config.html"><i data-lucide="sliders-horizontal" style="width:14px;height:14px"></i>Back to Config & Setup</a>';
  html += '<a class="quick-link" href="agent_map.html"><i data-lucide="map" style="width:14px;height:14px"></i>Open full visual agent map</a>';
  html += '</div>';

  html += '<div class="section-head"><i data-lucide="map"></i> Visual Flow Map</div>';
  html += '<div class="map-wrap"><div class="excalimap">';
  html += '<svg viewBox="0 0 1320 860" preserveAspectRatio="none"><defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="rgba(93,228,212,0.7)"></path></marker></defs>';
  html += line(270,155,320,215);
  html += line(270,315,320,245);
  html += line(270,475,320,410);
  html += line(270,635,320,620);
  html += line(550,225,610,345);
  html += line(550,435,610,375);
  html += line(550,635,610,405);
  html += line(840,345,900,165);
  html += line(840,345,900,345);
  html += line(840,345,900,525);
  html += line(1130,165,1180,265,true);
  html += line(1130,345,1180,265,true);
  html += line(1130,525,1180,465,true);
  html += '</svg>';

  nodes.forEach(n => {
    const fileMeta = fileByName[n.key];
    const clickable = n.clickable !== false && !!fileMeta;
    html += `<div class="node ${clickable ? 'clickable' : ''}" ${clickable ? `data-file-index="${fileMeta.index}" role="button" tabindex="0" aria-label="Open ${esc(n.key)}` : ''}" style="left:${n.x}px;top:${n.y}px;--rot:${n.rot}"><h3>${esc(n.title)}</h3><p>${esc(n.desc)}</p>${clickable ? '<span class="badge-mini">click to open</span>' : ''}</div>`;
  });

  html += '</div></div>';
  html += '<div class="canvas-note">This is now the only file interface here. The duplicate file list is gone.</div>';

  html += '<div class="section-head"><i data-lucide="boxes"></i> Reading guide</div>';
  html += '<div class="legend">';
  html += '<div class="legend-card"><strong>Left</strong><span>Source files that define dashboard content.</span></div>';
  html += '<div class="legend-card"><strong>Middle-left</strong><span>Build and validation layer.</span></div>';
  html += '<div class="legend-card"><strong>Middle</strong><span>The generated bundle: data.js.</span></div>';
  html += '<div class="legend-card"><strong>Middle-right</strong><span>Dashboard pages that consume the bundle.</span></div>';
  html += '<div class="legend-card"><strong>Right</strong><span>Publish helpers that make it live online.</span></div>';
  html += '</div>';

  html += '<div class="section-head"><i data-lucide="link-2"></i> Key relationships</div>';
  html += '<div class="link-list">';
  html += '<div class="link-row"><div class="link-name">commands.json → config.html</div><div class="link-desc">Quick Commands section</div></div>';
  html += '<div class="link-row"><div class="link-name">tasks.json → tasks.html</div><div class="link-desc">Task list and home card counts</div></div>';
  html += '<div class="link-row"><div class="link-name">projects.json → projects.html</div><div class="link-desc">Project cards and scores</div></div>';
  html += '<div class="link-row"><div class="link-name">refresh.sh → data.js</div><div class="link-desc">Build step for all pages</div></div>';
  html += '<div class="link-row"><div class="link-name">publish.sh → GitHub Pages</div><div class="link-desc">Makes changes visible online</div></div>';
  html += '</div>';

  body.innerHTML = html;

  function openFileModal(index) {
    const f = files[index];
    if (!f) return;
    modalTitle.textContent = `${f.file} — ${f.label}`;
    modalBody.innerHTML = `<div style="margin-bottom:var(--s3);color:var(--text-3);font-size:var(--fs-xs)">${esc(f.description || '')}</div><pre class="code-block"><code>${esc(f.content || '')}</code></pre>`;
    overlay.classList.add('open');
    overlay.setAttribute('aria-hidden', 'false');
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }
  function closeFileModal() {
    overlay.classList.remove('open');
    overlay.setAttribute('aria-hidden', 'true');
  }
  document.querySelectorAll('[data-file-index]').forEach(node => {
    node.addEventListener('click', () => openFileModal(node.dataset.fileIndex));
    node.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openFileModal(node.dataset.fileIndex);
      }
    });
  });
  closeBtn.addEventListener('click', closeFileModal);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeFileModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && overlay.classList.contains('open')) closeFileModal(); });
  if (typeof lucide !== 'undefined') lucide.createIcons();
});
</script>
<link rel="stylesheet" href="../a11y-tester.css">
<script src="../a11y-widget.js"></script>
<script src="../a11y-tester.js"></script>
</body>
</html>
