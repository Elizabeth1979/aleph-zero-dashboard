<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>Dashboard Internals — Hermes</title>
<link rel="stylesheet" href="../theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/roughjs@latest/bundled/rough.js"></script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="../a11y-widget.css">
<style>
/* ── Tab bar ──────────────────────────────── */
.tab-bar { display:flex; gap:4px; margin-top:var(--s4); border-bottom:1px solid var(--border); }
.tab-btn { background:none; border:none; padding:10px 20px; color:var(--text-3); font-size:var(--fs-sm); font-family:var(--sans); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color .15s, border-color .15s; display:flex; align-items:center; gap:8px; }
.tab-btn:hover { color:var(--text); }
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab-panel { display:none; margin-top:var(--s4); }
.tab-panel.active { display:block; }

/* ── Visual tab ───────────────────────────── */
.canvas-wrap { overflow:auto; padding-bottom:var(--s4); }
canvas#flowmap { display:block; cursor:default; }
.canvas-hint { color:var(--text-3); font-size:var(--fs-xs); margin-top:var(--s2); }
.excalidraw-link { display:inline-flex; align-items:center; gap:8px; color:var(--accent); text-decoration:none; font-size:var(--fs-sm); margin-top:var(--s3); }

/* ── Interactive tab ──────────────────────── */
.file-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:var(--s3); margin-top:var(--s3); }
.file-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r2); padding:var(--s4); cursor:pointer; transition:border-color .15s, transform .15s; }
.file-card:hover { border-color:var(--accent); transform:translateY(-2px); }
.file-name { font-family:var(--mono); color:var(--accent); font-size:var(--fs-sm); margin-bottom:6px; }
.file-label { color:var(--text); font-weight:600; font-size:var(--fs-sm); margin-bottom:6px; }
.file-desc { color:var(--text-3); font-size:var(--fs-sm); }
.file-group-title { color:var(--text-3); font-size:var(--fs-xs); text-transform:uppercase; letter-spacing:.06em; border-bottom:1px solid var(--border); padding-bottom:var(--s1); margin:var(--s5) 0 var(--s3); }
.file-group-title:first-child { margin-top:0; }

/* ── Modal ────────────────────────────────── */
.prompt-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); z-index:1000; display:flex; align-items:center; justify-content:center; padding:var(--s6); opacity:0; visibility:hidden; transition:opacity .2s, visibility .2s; }
.prompt-overlay.open { opacity:1; visibility:visible; }
.prompt-modal { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r2); padding:var(--s5); max-width:860px; width:100%; max-height:85vh; overflow-y:auto; display:flex; flex-direction:column; gap:var(--s3); transform:translateY(8px); transition:transform .2s; }
.prompt-overlay.open .prompt-modal { transform:translateY(0); }
.prompt-modal-header { display:flex; align-items:center; justify-content:space-between; gap:var(--s3); }
.prompt-modal-header h2 { font-size:var(--fs-sm); font-weight:600; color:var(--text); margin:0; }
.prompt-modal-close { background:none; border:none; color:var(--text-3); cursor:pointer; padding:4px; border-radius:4px; display:flex; align-items:center; }
.prompt-modal-close:hover { color:var(--text); }
.prompt-modal-body { font-size:var(--fs-sm); color:var(--text-2); word-break:break-word; line-height:1.6; padding:var(--s4); background:var(--bg-inset); border-radius:var(--r1); }
.prompt-modal-body pre.code-block { background:rgba(0,0,0,.3); padding:var(--s3); border-radius:var(--r1); overflow-x:auto; margin:0; }
.prompt-modal-body code { font-family:var(--mono); font-size:.9em; }
</style>
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <h1 class="page-title"><i data-lucide="workflow"></i> Dashboard Internals</h1>
  </div>
  <div class="page-body" id="page-body">

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="visual">
        <i data-lucide="eye" style="width:14px;height:14px"></i> Visual map
      </button>
      <button class="tab-btn" data-tab="interactive">
        <i data-lucide="folder-code" style="width:14px;height:14px"></i> Browse files
      </button>
    </div>

    <!-- ── Visual tab ── -->
    <div class="tab-panel active" id="tab-visual">
      <div class="canvas-wrap">
        <canvas id="flowmap" width="1340" height="560"></canvas>
      </div>
      <div class="canvas-hint">Hover over a node to see its description. Click to open the file.</div>
      <a class="excalidraw-link" href="https://excalidraw.com/#json=zJLOfHanNwFvr3fsj93-m,WTPOKK4Djnonz7h1empWPw" target="_blank" rel="noopener noreferrer">
        <i data-lucide="external-link" style="width:14px;height:14px"></i> Open editable diagram on Excalidraw.com
      </a>
    </div>

    <!-- ── Interactive tab ── -->
    <div class="tab-panel" id="tab-interactive">
      <div id="file-list"></div>
    </div>

  </div>
  <div class="page-footer">built with ❤️ by e11i</div>
</div>

<div class="prompt-overlay" id="file-overlay" aria-hidden="true">
  <div class="prompt-modal" role="dialog" aria-modal="true" aria-labelledby="file-modal-title">
    <div class="prompt-modal-header">
      <h2 id="file-modal-title">File</h2>
      <button class="prompt-modal-close" id="file-modal-close" aria-label="Close">
        <i data-lucide="x" style="width:18px;height:18px"></i>
      </button>
    </div>
    <div class="prompt-modal-body" id="file-modal-body"></div>
  </div>
</div>

<script src="utils.js"></script>
<script src="../data.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  const files = d.dashboard_files || [];
  const fileByName = Object.fromEntries(files.map((f, i) => [f.file, { ...f, index: i }]));
  const overlay = document.getElementById('file-overlay');
  const modalTitle = document.getElementById('file-modal-title');
  const modalBody = document.getElementById('file-modal-body');
  const closeBtn = document.getElementById('file-modal-close');

  // ── Modal helpers ──
  function openFileModal(idx) {
    const f = files[idx];
    if (!f) return;
    modalTitle.textContent = `${f.file} — ${f.label}`;
    modalBody.innerHTML = `<div style="margin-bottom:var(--s3);color:var(--text-3);font-size:var(--fs-xs)">${esc(f.description||'')}</div><pre class="code-block"><code>${esc(f.content||'')}</code></pre>`;
    overlay.classList.add('open');
    overlay.setAttribute('aria-hidden', 'false');
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }
  function closeFileModal() {
    overlay.classList.remove('open');
    overlay.setAttribute('aria-hidden', 'true');
  }
  closeBtn.addEventListener('click', closeFileModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeFileModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && overlay.classList.contains('open')) closeFileModal(); });

  // ── Tab switching ──
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
    });
  });

  // ── Visual tab: rough.js canvas ──
  const COLS = {
    src:   { x: 60,   label: 'Source files',  color: '#a5d8ff', stroke: '#4a9eed' },
    build: { x: 360,  label: 'Build layer',   color: '#ffd8a8', stroke: '#f59e0b' },
    data:  { x: 640,  label: 'Data bundle',   color: '#c3fae8', stroke: '#22c55e' },
    pages: { x: 910,  label: 'UI pages',      color: '#d0bfff', stroke: '#8b5cf6' },
    ship:  { x: 1140, label: 'Ship layer',    color: '#b2f2bb', stroke: '#22c55e' }
  };

  const NODES = [
    { id:'cmds',       col:'src',   y:100, label:'commands.json',           file:'commands.json' },
    { id:'tasks',      col:'src',   y:200, label:'tasks.json',              file:'tasks.json' },
    { id:'projects',   col:'src',   y:300, label:'projects.json',           file:'projects.json' },
    { id:'resources',  col:'src',   y:400, label:'resources.json',          file:'resources.json' },

    { id:'refresh',    col:'build', y:150, label:'refresh.sh',              file:'refresh.sh' },
    { id:'validate',   col:'build', y:280, label:'validate_dashboard.py',   file:'validate_dashboard.py' },
    { id:'checklist',  col:'build', y:390, label:'dashboard_checklist.json',file:'dashboard_checklist.json' },

    { id:'datajs',     col:'data',  y:230, label:'data.js',                 file:null },

    { id:'index_h',    col:'pages', y:90,  label:'index.html',              file:null },
    { id:'config_h',   col:'pages', y:180, label:'config.html',             file:null },
    { id:'internals_h',col:'pages', y:270, label:'dashboard_internals.html',file:null },
    { id:'agentmap_h', col:'pages', y:360, label:'agent_map.html',          file:null },
    { id:'other_h',    col:'pages', y:450, label:'tasks / projects / skills',file:null },

    { id:'publish_sh', col:'ship',  y:180, label:'publish.sh',              file:'publish.sh' },
    { id:'updtasks',   col:'ship',  y:290, label:'update_tasks.sh',         file:'update_tasks.sh' },
    { id:'github',     col:'ship',  y:400, label:'GitHub Pages ✓',          file:null }
  ];

  const W = 180, H = 52;
  const hitAreas = [];

  function nx(col) { return COLS[col].x; }
  function cy(n) { return n.y + H / 2; }

  const canvas = document.getElementById('flowmap');
  const ctx = canvas.getContext('2d');
  const rc = typeof rough !== 'undefined' ? rough.canvas(canvas) : null;

  function drawAll(hovered) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // section labels
    Object.values(COLS).forEach(col => {
      ctx.font = '12px Inter,sans-serif';
      ctx.fillStyle = '#666';
      ctx.fillText(col.label.toUpperCase(), col.x, 30);
    });

    const ARROWS = [
      ['src','cmds',    'build','refresh'],
      ['src','tasks',   'build','refresh'],
      ['src','projects','build','refresh'],
      ['src','resources','build','refresh'],
      ['build','refresh','data','datajs'],
      ['build','validate','data','datajs', true],
      ['data','datajs','pages','index_h'],
      ['data','datajs','pages','config_h'],
      ['data','datajs','pages','internals_h'],
      ['data','datajs','pages','agentmap_h'],
      ['data','datajs','pages','other_h'],
      ['pages','index_h','ship','publish_sh'],
      ['pages','config_h','ship','publish_sh'],
      ['pages','internals_h','ship','publish_sh'],
      ['pages','agentmap_h','ship','publish_sh'],
      ['src','tasks','ship','updtasks', false, true],
      ['ship','publish_sh','ship','github'],
    ];

    ARROWS.forEach(([c1,n1,c2,n2,dashed,skip]) => {
      if (skip) return;
      const sNode = NODES.find(n=>n.id===n1);
      const eNode = NODES.find(n=>n.id===n2);
      if (!sNode||!eNode) return;
      const x1 = nx(c1)+W, y1 = cy(sNode);
      const x2 = nx(c2),   y2 = cy(eNode);
      const mx = (x1+x2)/2;
      if (rc) {
        rc.curve([[x1,y1],[mx,y1],[mx,y2],[x2,y2]], {
          stroke: 'rgba(93,228,212,0.75)', strokeWidth: 2,
          roughness: 1.4, strokeLineDash: dashed ? [8,6] : []
        });
        rc.linearPath([[x2-2,y2-6],[x2+8,y2],[x2-2,y2+6]], {
          stroke:'rgba(93,228,212,0.9)', strokeWidth:2, roughness:0.5
        });
      }
    });

    NODES.forEach(n => {
      const x = nx(n.col), y = n.y;
      const col = COLS[n.col];
      const isHovered = hovered && hovered.id === n.id;
      const hasFile = !!fileByName[n.file];

      if (rc) {
        rc.rectangle(x, y, W, H, {
          fill: col.color,
          fillStyle: 'solid',
          stroke: isHovered ? '#5de4d4' : col.stroke,
          strokeWidth: isHovered ? 2.5 : 1.8,
          roughness: 1.5
        });
      }

      ctx.font = `${hasFile ? '600' : '400'} 13px JetBrains Mono,monospace`;
      ctx.fillStyle = isHovered ? '#222' : '#1e1e1e';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const maxW = W - 12;
      let label = n.label;
      if (ctx.measureText(label).width > maxW) {
        label = label.slice(0, 18) + '…';
      }
      ctx.fillText(label, x + W/2, y + H/2);
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';

      if (hasFile) {
        ctx.font = '10px Inter,sans-serif';
        ctx.fillStyle = 'rgba(93,228,212,0.8)';
        ctx.fillText('open ↗', x + W - 44, y + H - 6);
      }
    });
  }

  // build hit areas for hover + click
  NODES.forEach(n => {
    hitAreas.push({ x: nx(n.col), y: n.y, w: W, h: H, node: n });
  });

  let hoveredNode = null;
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    const hit = hitAreas.find(a => mx>=a.x && mx<=a.x+a.w && my>=a.y && my<=a.y+a.h);
    if (hit?.node?.id !== hoveredNode?.id) {
      hoveredNode = hit ? hit.node : null;
      canvas.style.cursor = (hoveredNode && fileByName[hoveredNode.file]) ? 'pointer' : 'default';
      drawAll(hoveredNode);
    }
  });
  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    const hit = hitAreas.find(a => mx>=a.x && mx<=a.x+a.w && my>=a.y && my<=a.y+a.h);
    if (hit?.node) {
      const meta = fileByName[hit.node.file];
      if (meta) openFileModal(meta.index);
    }
  });
  canvas.addEventListener('mouseleave', () => { hoveredNode = null; canvas.style.cursor='default'; drawAll(null); });

  drawAll(null);

  // ── Interactive tab: grouped file cards ──
  const groups = [
    { title: 'Source files', files: ['commands.json','tasks.json','projects.json','resources.json'] },
    { title: 'Build & validation', files: ['refresh.sh','validate_dashboard.py','dashboard_checklist.json','BEST-PRACTICES.md'] },
    { title: 'Publish', files: ['publish.sh','update_tasks.sh'] },
    { title: 'Planning & reference', files: ['PLAN.md','SYSTEM_SETTINGS.md'] }
  ];

  const listEl = document.getElementById('file-list');
  let innerHtml = '';
  groups.forEach(g => {
    const groupFiles = g.files.map(fn => fileByName[fn]).filter(Boolean);
    if (!groupFiles.length) return;
    innerHtml += `<div class="file-group-title">${esc(g.title)}</div><div class="file-grid">`;
    groupFiles.forEach(f => {
      innerHtml += `<div class="file-card" data-file-index="${f.index}" role="button" tabindex="0" aria-label="Open ${esc(f.file)}">
        <div class="file-name">${esc(f.file)}</div>
        <div class="file-label">${esc(f.label)}</div>
        <div class="file-desc">${esc(f.description||'')}</div>
      </div>`;
    });
    innerHtml += '</div>';
  });
  listEl.innerHTML = innerHtml;
  document.querySelectorAll('.file-card').forEach(card => {
    card.addEventListener('click', () => openFileModal(card.dataset.fileIndex));
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openFileModal(card.dataset.fileIndex); }
    });
  });

  if (typeof lucide !== 'undefined') lucide.createIcons();
});
</script>
<link rel="stylesheet" href="../a11y-tester.css">
<script src="../a11y-widget.js"></script>
<script src="../a11y-tester.js"></script>
</body>
</html>
