<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>Long-Term Memory — Aleph Zero</title>
<link rel="stylesheet" href="../theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page-wrap" style="max-width:1100px">
  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <h1 class="page-title"><i data-lucide="database"></i> Long-Term Memory</h1>
  </div>
    <button id="view-toggle" class="btn btn-save" style="margin-left:auto;font-size:var(--fs-xs)"><i data-lucide="rows-3" style="width:13px;height:13px"></i> Raw View</button>
  <div class="page-body" id="page-body"></div>
  <div class="page-footer">built with ❤️ by e11i</div>
</div>
<script src="utils.js?v=5"></script>
<script src="../data.js?v=1775847552"></script>
<script>

document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  const mem = d.memory || {};
  const el = document.getElementById('page-body');

  if (!mem.total_drawers) {
    el.textContent = 'No memories indexed yet';
    return;
  }

  // Hide the view toggle — not needed for summary view
  const toggle = document.getElementById('view-toggle');
  if (toggle) toggle.style.display = 'none';

  const wings = mem.wings || {};
  const rooms = mem.rooms || {};

  let html = '';

  // Summary stats
  html += '<div class="modal-chroma-cat">Overview</div>';
  html += '<div class="modal-chroma-entry">';
  html += '<strong>' + mem.total_drawers + '</strong> total drawers across ';
  html += '<strong>' + Object.keys(wings).length + '</strong> wings and ';
  html += '<strong>' + Object.keys(rooms).length + '</strong> rooms';
  html += '</div>';

  // Wings
  html += '<div class="modal-chroma-cat">Wings</div>';
  Object.entries(wings).sort((a,b) => b[1] - a[1]).forEach(function(entry) {
    html += '<div class="modal-chroma-entry">';
    html += '<strong>' + esc(entry[0]) + '</strong>: ' + entry[1] + ' drawers';
    html += '</div>';
  });

  // Rooms
  html += '<div class="modal-chroma-cat">Rooms (' + Object.keys(rooms).length + ')</div>';
  Object.entries(rooms).sort((a,b) => b[1] - a[1]).forEach(function(entry) {
    html += '<div class="modal-chroma-entry">';
    html += '<strong>' + esc(entry[0]) + '</strong>: ' + entry[1] + ' drawers';
    html += '</div>';
  });

  el.textContent = '';
  el.insertAdjacentHTML('beforeend', html);
  if (typeof lucide !== 'undefined') lucide.createIcons();
});

</script>
</body>
</html>
