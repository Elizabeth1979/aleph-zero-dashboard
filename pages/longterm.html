<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>Long-Term Memory — Hermes</title>
<link rel="stylesheet" href="../theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="../a11y-widget.css">
</head>
<body>
<div class="page-wrap" style="max-width:1100px">
  <header class="site-header">
    <a href="../index.html" class="site-logo">Hermes — Elli's Agent AI</a>
  </header>
  <h1 class="page-title"><i data-lucide="database"></i> Long-Term Memory</h1>
    <button id="view-toggle" class="btn btn-save" style="margin-left:auto;font-size:var(--fs-xs)"><i data-lucide="rows-3" style="width:13px;height:13px"></i> Raw View</button>
  <div class="page-body" id="page-body"></div>
  <div class="page-footer">built with ❤️ by e11i</div>
</div>
<script src="utils.js?v=5"></script>
<script src="../data.js"></script>
<script>

document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  const chroma = d.chroma || {};
  if (!chroma.memories || !chroma.memories.length) {
    document.getElementById('page-body').innerHTML = '<div class="empty">No long-term memories</div>';
    return;
  }
  const cats = {};
  chroma.memories.forEach(m => {
    const c = m.category || 'general';
    if (!cats[c]) cats[c] = [];
    cats[c].push(m);
  });

  let rawMode = false;

  let activeFilter = 'all';
  const catNames = Object.keys(cats).sort();

  function render() {
    let html = '';
    if (!rawMode) {
      // Simple view: grouped by category
      catNames.forEach(cat => {
        html += `<div class="modal-chroma-cat">${esc(cat)} (${cats[cat].length})</div>`;
        cats[cat].forEach(m => {
          html += `<div class="modal-chroma-entry">${esc(m.text)}</div>`;
        });
      });
    } else {
      // Raw view: filter pills + table
      html += `<div class="chroma-filters">`;
      html += `<button class="pill${activeFilter === 'all' ? ' active' : ''}" data-cat="all">All (${chroma.memories.length})</button>`;
      catNames.forEach(cat => {
        html += `<button class="pill${activeFilter === cat ? ' active' : ''}" data-cat="${esc(cat)}">${esc(cat)} (${cats[cat].length})</button>`;
      });
      html += `</div>`;

      const filtered = activeFilter === 'all'
        ? chroma.memories.slice().sort((a, b) => (a.category || '').localeCompare(b.category || ''))
        : cats[activeFilter] || [];

      html += `<div class="chroma-table-wrap"><table class="chroma-table">`;
      html += `<thead><tr><th>ID</th><th>Category</th><th>Text</th><th>Created</th></tr></thead><tbody>`;
      filtered.forEach(m => {
        const ts = m.timestamp ? m.timestamp.slice(0, 10) : '—';
        html += `<tr>`;
        html += `<td class="chroma-td-id">${esc(m.id)}</td>`;
        html += `<td class="chroma-td-cat">${esc(m.category || 'general')}</td>`;
        html += `<td>${esc(m.text)}</td>`;
        html += `<td class="chroma-td-ts">${esc(ts)}</td>`;
        html += `</tr>`;
      });
      html += `</tbody></table></div>`;
    }
    document.getElementById('page-body').innerHTML = html;
    if (typeof lucide !== 'undefined') lucide.createIcons();

    // Attach filter click handlers
    document.querySelectorAll('.chroma-filters .pill').forEach(btn => {
      btn.addEventListener('click', () => {
        activeFilter = btn.dataset.cat;
        render();
      });
    });
  }

  document.getElementById('view-toggle').addEventListener('click', () => {
    rawMode = !rawMode;
    const btn = document.getElementById('view-toggle');
    btn.innerHTML = rawMode
      ? '<i data-lucide="list" style="width:13px;height:13px"></i> Simple View'
      : '<i data-lucide="rows-3" style="width:13px;height:13px"></i> Raw View';
    if (typeof lucide !== 'undefined') lucide.createIcons();
    render();
  });

  render();
});

</script>
<link rel="stylesheet" href="../a11y-tester.css">
<script src="../a11y-widget.js"></script>
<script src="../a11y-tester.js"></script>
</body>
</html>
