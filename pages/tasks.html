<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks — Hermes</title>
<link rel="stylesheet" href="../theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="../a11y-widget.css">
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <h1 class="page-title"><i data-lucide="check-circle-2"></i> Tasks</h1>
  </div>
  <div class="page-body" id="page-body"></div>
</div>
<script src="utils.js"></script>
<script src="../data.js"></script>
<script>

document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  const tasks = d.tasks || [];
  if (!tasks.length) { document.getElementById('page-body').innerHTML = '<div class="empty">All clear — nothing to track</div>'; return; }

  const catMeta = {
    task:     { icon: 'circle-check', label: 'Tasks' },
    idea:     { icon: 'lightbulb', label: 'Ideas' },
    read:     { icon: 'book-open', label: 'To Read' },
    write:    { icon: 'pen-line', label: 'To Write' },
    share:    { icon: 'send', label: 'Share / Send' },
    remember: { icon: 'bookmark', label: 'Remember' },
  };
  const catOrder = ['task', 'idea', 'read', 'write', 'share', 'remember'];

  // Group by category
  const groups = {};
  tasks.forEach(t => {
    const cat = t.category || 'task';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(t);
  });

  function renderTask(t) {
    const cls = t.done ? 'task done' : 'task';
    const check = t.done ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent-dim)"><polyline points="20 6 9 17 4 12"></polyline></svg>' : '';
    const safePri = ['high','medium','low','critical'].includes(t.priority) ? t.priority : null;
    const pri = safePri ? `<span class="task-pri ${safePri}">${safePri}</span>` : '';
    return `<div class="${cls}">
      <div class="task-check">${check}</div>
      <span class="task-text">${esc(t.task)}</span>
      ${pri}
      <span class="task-date">${t.added || ''}</span>
    </div>`;
  }

  // Pull urgent (high priority, not done) to the top
  const urgent = tasks.filter(t => !t.done && t.priority === 'high');
  const rest = tasks.filter(t => !(t.priority === 'high' && !t.done));

  let html = '';

  // Urgent section
  if (urgent.length) {
    html += `<div class="cat-section">
      <div class="cat-header" style="color:var(--danger)">
        <i data-lucide="alert-triangle"></i> Urgent
        <span class="cat-count">${urgent.length}</span>
      </div>
      ${urgent.map(renderTask).join('')}
    </div>`;
  }

  // Group remaining by category
  const groups2 = {};
  rest.forEach(t => {
    const cat = t.category || 'task';
    if (!groups2[cat]) groups2[cat] = [];
    groups2[cat].push(t);
  });

  const activeCats = catOrder.filter(c => groups2[c] && groups2[c].length);
  Object.keys(groups2).forEach(c => { if (!catOrder.includes(c)) activeCats.push(c); });

  activeCats.forEach(cat => {
    const items = groups2[cat];
    const open = items.filter(t => !t.done);
    const done = items.filter(t => t.done);
    const meta = catMeta[cat] || { icon: 'circle', label: cat };
    const openCount = open.length;

    html += `<div class="cat-section">
      <div class="cat-header">
        <i data-lucide="${meta.icon}"></i> ${meta.label}
        <span class="cat-count">${openCount} open</span>
      </div>
      ${[...open, ...done].map(renderTask).join('')}
    </div>`;
  });

  // Capture rules panel
  const rules = d.capture_rules || {};
  if (rules.categories || rules.auto_high) {
    const catColors = {
      task: 'var(--text-2)', idea: '#c084fc', read: '#60a5fa',
      write: '#34d399', share: '#fbbf24', remember: '#a78bfa'
    };

    let rulesHtml = '<div class="rules-group"><div class="rules-group-title">Categories</div>';
    if (rules.categories) {
      Object.entries(rules.categories).forEach(([key, desc]) => {
        const color = catColors[key] || 'var(--text-3)';
        rulesHtml += `<div class="rules-item"><span class="rules-cat-dot" style="background:${color}"></span> <strong>${key}</strong> — ${esc(desc)}</div>`;
      });
    }
    rulesHtml += '</div>';

    rulesHtml += '<div class="rules-group"><div class="rules-group-title">Auto High Priority</div>';
    if (rules.auto_high) {
      rules.auto_high.forEach(r => {
        rulesHtml += `<div class="rules-item"><i data-lucide="alert-triangle" style="color:var(--danger)"></i> ${esc(r)}</div>`;
      });
    }
    rulesHtml += '</div>';

    rulesHtml += `<div class="rules-group">
      <div class="rules-item"><i data-lucide="minus-circle"></i> <strong>Default:</strong> ${esc(rules.default_priority || 'medium')}</div>
      <div class="rules-item"><i data-lucide="arrow-down-circle"></i> <strong>Low:</strong> ${esc(rules.low_trigger || '')}</div>
      <div class="rules-item"><i data-lucide="help-circle"></i> <strong>Ask when:</strong> ${esc(rules.ask_when || '')}</div>
    </div>`;

    html += `<div class="rules-panel">
      <div class="rules-toggle" onclick="document.getElementById('rules-body').classList.toggle('show'); this.querySelector('[data-lucide]').setAttribute('data-lucide', document.getElementById('rules-body').classList.contains('show') ? 'chevron-down' : 'chevron-right'); if (typeof lucide !== 'undefined') lucide.createIcons();">
        <i data-lucide="chevron-right"></i> Capture Rules — how items get categorized
      </div>
      <div class="rules-content" id="rules-body">${rulesHtml}</div>
    </div>`;
  }

  document.getElementById('page-body').innerHTML = html;
  if (typeof lucide !== 'undefined') lucide.createIcons();
});

</script>
<script src="../a11y-widget.js"></script>
</body>
</html>
