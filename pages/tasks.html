<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks — Hermes</title>
<link rel="stylesheet" href="../theme.css?v=3">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="../a11y-widget.css">
<style>
  /* Task page specific */
  .task-section {
    margin-bottom: var(--s5);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    overflow: hidden;
  }
  .task-section-header {
    display: flex; align-items: center; gap: var(--s3);
    padding: var(--s3) var(--s4);
    cursor: pointer;
    transition: background 0.15s ease;
    user-select: none;
  }
  .task-section-header:hover { background: rgba(255,255,255,0.03); }
  .task-section-chevron {
    width: 14px; height: 14px; color: var(--text-3);
    transition: transform 0.2s ease; flex-shrink: 0;
  }
  .task-section.open .task-section-chevron { transform: rotate(90deg); }
  .task-section-label {
    font-size: var(--fs-sm); font-weight: 600; color: var(--text); flex: 1;
  }
  .task-section-label.urgent { color: var(--danger); }
  .task-section-count {
    font-size: var(--fs-xs); color: var(--text-3);
    background: rgba(255,255,255,0.04);
    padding: 2px 8px; border-radius: var(--pill);
  }
  .task-section-count.accent {
    color: var(--accent); background: var(--accent-muted);
  }
  .task-section-body {
    display: none;
    border-top: 1px solid var(--border);
  }
  .task-section.open .task-section-body { display: block; }
  .task-item {
    display: flex; align-items: flex-start; gap: var(--s3);
    padding: var(--s3) var(--s4);
    border-bottom: 1px solid var(--border);
  }
  .task-item:last-child { border-bottom: none; }

  .task-item-status {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    margin-top: 7px;
    background: var(--text-3); opacity: 0.4;
  }

  .task-item-content { flex: 1; min-width: 0; }
  /* LOCKED LAYOUT — text left, pills right. Approved by Elli 2026-04-05. Do not change. */
  .task-item-row {
    display: flex; align-items: baseline; justify-content: space-between; gap: var(--s4);
  }
  .task-item-pills {
    display: flex; gap: 6px; flex-shrink: 0; justify-content: flex-end;
  }
  .task-item-text {
    font-size: var(--fs-sm); color: var(--text);
    line-height: 1.4; flex: 1; min-width: 0;
  }
  .task-item-desc {
    font-size: 12px; color: var(--text-3);
    line-height: 1.4; margin-top: 3px;
  }
  .task-item-pri {
    font-size: 11px; font-weight: 600;
    padding: 1px 6px; border-radius: var(--pill);
  }
  .task-item-pri.high { color: var(--danger); background: rgba(224,108,117,0.12); }
  .task-item-pri.medium { color: var(--warn); background: rgba(240,184,102,0.12); }
  .task-item-pri.low { color: var(--accent); background: var(--accent-muted); }
  .task-item-date {
    font-size: 11px; font-family: var(--mono); color: var(--text-3);
  }

  /* Rules panel */
  .rules-section {
    margin-top: var(--s5);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    overflow: hidden;
  }
  .rules-header {
    display: flex; align-items: center; gap: var(--s3);
    padding: var(--s3) var(--s4);
    cursor: pointer;
    font-size: var(--fs-sm); color: var(--text-2);
    transition: background 0.15s ease;
  }
  .rules-header:hover { background: rgba(255,255,255,0.03); }
  .rules-chevron {
    width: 14px; height: 14px; color: var(--text-3);
    transition: transform 0.2s ease; flex-shrink: 0;
  }
  .rules-section.open .rules-chevron { transform: rotate(90deg); }
  .rules-body {
    display: none;
    padding: var(--s4); border-top: 1px solid var(--border);
    background: var(--bg-inset);
  }
  .rules-section.open .rules-body { display: block; }
  .rules-block { margin-bottom: var(--s5); }
  .rules-block:last-child { margin-bottom: 0; }
  .rules-block-title {
    font-size: var(--fs-xs); font-weight: 600; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: var(--s3);
  }

  /* Category chips — 2-col grid */
  .cat-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: var(--s2);
  }
  .cat-chip {
    display: flex; align-items: center; gap: var(--s2);
    padding: var(--s2) var(--s3);
    background: rgba(255,255,255,0.04);
    border-radius: var(--r1);
    border-left: 3px solid var(--chip-color, var(--text-3));
  }
  .cat-chip-name {
    font-size: var(--fs-sm); font-weight: 600; color: var(--text);
  }
  .cat-chip-desc {
    font-size: 12px; color: var(--text-3); margin-top: 1px;
  }

  /* Urgent tag on task items */
  /* Tag pills (Work, Private, etc.) */
  .task-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    border-radius: 4px;
    padding: 1px 6px;
    vertical-align: middle;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .task-tag.tag-work {
    color: #60a5fa; background: rgba(96, 165, 250, 0.12);
    border: 1px solid rgba(96, 165, 250, 0.25);
  }
  .task-tag.tag-private {
    color: #a78bfa; background: rgba(167, 139, 250, 0.12);
    border: 1px solid rgba(167, 139, 250, 0.25);
  }
  .task-tag.tag-buy {
    color: #34d399; background: rgba(52, 211, 153, 0.12);
    border: 1px solid rgba(52, 211, 153, 0.25);
  }
  .task-tag.tag-default {
    color: var(--text-3); background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
  }

  /* Due-date pill on task items */
  .due-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-muted);
    border: 1px solid rgba(86, 182, 194, 0.25);
    border-radius: 4px;
    padding: 1px 6px;
    margin-left: 8px;
    vertical-align: middle;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }

  /* Auto-urgent — compact callout */
  .auto-high-box {
    background: rgba(224, 108, 117, 0.08);
    border: 1px solid rgba(224, 108, 117, 0.2);
    border-radius: var(--r1);
    padding: var(--s3);
  }
  .auto-high-row {
    display: flex; align-items: baseline; gap: var(--s2);
    font-size: var(--fs-sm); color: var(--text);
    padding: 2px 0;
  }
  .auto-high-row::before {
    content: ''; display: inline-block;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--danger); flex-shrink: 0;
    position: relative; top: -1px;
  }
  .auto-high-row strong { color: var(--danger); font-weight: 600; }

  /* Filter bar */
  .filter-bar {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: var(--s4);
  }
  .filter-btn {
    font-size: 12px; font-weight: 600;
    padding: 4px 12px; border-radius: var(--pill);
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: var(--text-3);
    cursor: pointer; transition: all 0.15s ease;
    font-family: inherit;
  }
  .filter-btn:hover { background: rgba(255,255,255,0.08); }
  .filter-btn.active {
    color: var(--bg); font-weight: 700;
  }
  .filter-btn.active[data-filter="all"] {
    background: var(--text-2); border-color: var(--text-2); color: var(--bg);
  }
  .filter-btn.active[data-filter="Work"] {
    background: #60a5fa; border-color: #60a5fa;
  }
  .filter-btn.active[data-filter="Private"] {
    background: #a78bfa; border-color: #a78bfa;
  }
  .filter-btn.active[data-filter="Buy"] {
    background: #34d399; border-color: #34d399;
  }

  /* Urgent rules — inline */
  .urgent-rules {
    display: flex; flex-wrap: wrap; gap: var(--s2) var(--s4);
    font-size: var(--fs-xs); color: var(--text-3);
  }
  .urgent-rules strong { color: var(--text-2); font-weight: 600; }
</style>
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <h1 class="page-title"><i data-lucide="list-todo"></i> Tasks</h1>
  </div>
  <div class="page-body" id="page-body"></div>
</div>
<script src="utils.js?v=5"></script>
<script src="../data.js"></script>
<script>

function toggleSection(el) {
  el.classList.toggle('open');
}

document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  const tasks = d.tasks || [];
  if (!tasks.length) {
    document.getElementById('page-body').innerHTML = '<div class="empty">All clear — nothing to track</div>';
    return;
  }

  const chevron = '<svg class="task-section-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

  const pillColors = {
    'to-buy': 'var(--accent)', idea: '#c084fc', read: '#60a5fa',
    write: '#34d399', share: '#fbbf24', remember: '#a78bfa',
    task: 'var(--text-3)'
  };

  function fmtDue(iso) {
    const d = new Date(iso + 'T00:00:00');
    const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
    return mon + ' ' + d.getDate();
  }
  function renderItem(t) {
    const cls = t.done ? 'task-item done' : 'task-item';
    const due = t.due ? `<span class="due-tag">Due ${fmtDue(t.due)}</span>` : '';
    const tags = (t.tags || []).map(tag => {
      const c = 'task-tag tag-' + tag.toLowerCase().replace(/[^a-z]/g, '');
      return `<span class="${c}">${esc(tag)}</span>`;
    }).join('');
    const desc = t.desc ? `<div class="task-item-desc">${esc(t.desc)}</div>` : '';
    const tagList = (t.tags || []).join(',');
    return `<div class="${cls}" data-tags="${tagList}">
      <div class="task-item-status"></div>
      <div class="task-item-content">
        <div class="task-item-row">
          <div class="task-item-text">${esc(t.task)}</div>
          <div class="task-item-pills">${tags}${due}</div>
        </div>
        ${desc}
      </div>
    </div>`;
  }

  // Filter out project tasks — those live on the Projects page (matched by task_prefix)
  const projects = d.projects || [];
  const prefixes = projects.map(p => p.task_prefix).filter(Boolean);
  const nonProject = tasks.filter(t => !prefixes.some(px => t.task.startsWith(px)));

  // Urgent vs everything else — flat list, no category sections
  const urgent = nonProject.filter(t => !t.done && t.urgent);
  const rest = nonProject.filter(t => !t.done && !t.urgent);

  // Collect all unique tags for filter bar
  const allTags = new Set();
  nonProject.filter(t => !t.done).forEach(t => (t.tags || []).forEach(tag => allTags.add(tag)));
  
  let html = '';
  if (allTags.size) {
    html += '<div class="filter-bar"><button class="filter-btn active" data-filter="all">All</button>';
    allTags.forEach(tag => {
      html += `<button class="filter-btn" data-filter="${esc(tag)}">${esc(tag)}</button>`;
    });
    html += '</div>';
  }

  // Urgent section — open by default
  if (urgent.length) {
    html += `<div class="task-section open" onclick="toggleSection(this)">
      <div class="task-section-header">
        ${chevron}
        <span class="task-section-label urgent">Urgent</span>
        <span class="task-section-count accent">${urgent.length}</span>
      </div>
      <div class="task-section-body" onclick="event.stopPropagation()">
        ${urgent.map(renderItem).join('')}
      </div>
    </div>`;
  }

  // Group remaining by category
  const catMeta = { task: 'Tasks', 'to-buy': 'To Buy', idea: 'Ideas', read: 'To Read', write: 'To Write', share: 'Share', remember: 'Remember' };
  const catOrder = ['task', 'to-buy', 'idea', 'read', 'write', 'share', 'remember'];
  const groups = {};
  rest.forEach(t => { const cat = t.category || 'task'; if (!groups[cat]) groups[cat] = []; groups[cat].push(t); });
  const activeCats = catOrder.filter(c => groups[c] && groups[c].length);
  Object.keys(groups).forEach(c => { if (!catOrder.includes(c)) activeCats.push(c); });

  activeCats.forEach(cat => {
    const items = groups[cat];
    const label = catMeta[cat] || cat;
    html += `<div class="task-section open" onclick="toggleSection(this)">
      <div class="task-section-header">
        ${chevron}
        <span class="task-section-label">${label}</span>
        <span class="task-section-count accent">${items.length}</span>
      </div>
      <div class="task-section-body" onclick="event.stopPropagation()">
        ${items.map(renderItem).join('')}
      </div>
    </div>`;
  });

  // Auto-urgent rules — collapsed
  const rules = d.capture_rules || {};
  if (rules.auto_urgent) {
    let rulesHtml = '<div class="rules-block"><div class="rules-block-title">Auto-Urgent</div><div class="auto-high-box">';
    rules.auto_urgent.forEach(r => {
      const parts = r.split(' — ');
      if (parts.length === 2) {
        rulesHtml += `<div class="auto-high-row"><strong>${esc(parts[0])}</strong> — ${esc(parts[1])}</div>`;
      } else {
        rulesHtml += `<div class="auto-high-row">${esc(r)}</div>`;
      }
    });
    rulesHtml += '</div></div>';

    html += `<div class="rules-section open" onclick="toggleSection(this)">
      <div class="rules-header">
        <svg class="rules-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        Auto-Urgent Rules
      </div>
      <div class="rules-body" onclick="event.stopPropagation()">
        ${rulesHtml}
      </div>
    </div>`;
  }

  document.getElementById('page-body').innerHTML = html;
  if (typeof lucide !== 'undefined') lucide.createIcons();

  // Filter logic
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      // Toggle active state
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const filter = btn.dataset.filter;
      const items = document.querySelectorAll('.task-item');
      const sections = document.querySelectorAll('.task-section');

      items.forEach(item => {
        if (filter === 'all') {
          item.style.display = '';
        } else {
          const tags = (item.dataset.tags || '').split(',');
          item.style.display = tags.includes(filter) ? '' : 'none';
        }
      });

      // Hide sections that have no visible items
      sections.forEach(sec => {
        const body = sec.querySelector('.task-section-body');
        if (!body) return;
        const visible = body.querySelectorAll('.task-item:not([style*="display: none"])');
        sec.style.display = visible.length ? '' : 'none';
      });
    });
  });
});

</script>
<link rel="stylesheet" href="../a11y-tester.css">
<script src="../a11y-widget.js"></script>
<script src="../a11y-tester.js"></script>
</body>
</html>
