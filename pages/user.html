<script>

document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  const text = d.user_memory || '';
  const chars = d.user_chars;
  const limit = d.user_limit;
  const pct = d.user_pct;
  document.getElementById('page-body').innerHTML = `
    <div class="modal-meta">USER.md &bull; ${chars} / ${limit} chars (${pct}%)</div>
    <div class="usage-bar" style="margin-bottom:var(--s4)"><div class="usage-fill ${pct < 60 ? 'ok' : pct < 85 ? 'warn' : 'danger'}" style="width:${Math.min(pct,100)}%"></div></div>
    <div class="modal-editor rendered-md" id="editor-user">${renderMd(text)}</div>`;
  if (typeof lucide !== 'undefined') lucide.createIcons();
});

</script>
<link rel="stylesheet" href="../a11y-tester.css">

<script src="../a11y-tester.js"></script>
