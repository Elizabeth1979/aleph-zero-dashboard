<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile — Hermes</title>
<link rel="stylesheet" href="../theme.css?v=3">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="../a11y-widget.css">
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <h1 class="page-title"><i data-lucide="user"></i> User Profile</h1>
  </div>
  <div class="page-body" id="page-body"></div>
</div>
<script src="utils.js"></script>
<script src="../data.js"></script>
<script>

document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  const text = d.user_memory || '';
  const chars = d.user_chars;
  const limit = d.user_limit;
  const pct = d.user_pct;
  document.getElementById('page-body').innerHTML = `
    <div class="modal-meta">USER.md &bull; ${chars} / ${limit} chars (${pct}%)</div>
    <div class="usage-bar" style="margin-bottom:var(--s4)"><div class="usage-fill ${pct < 60 ? 'ok' : pct < 85 ? 'warn' : 'danger'}" style="width:${Math.min(pct,100)}%"></div></div>
    <div class="modal-editor" id="editor-user">${esc(text)}</div>`;
  if (typeof lucide !== 'undefined') lucide.createIcons();
});

</script>
<script src="../a11y-widget.js"></script>
</body>
</html>
