<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>Resources — Hermes</title>
<link rel="stylesheet" href="../theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <h1 class="page-title"><i data-lucide="bookmark"></i> Resources</h1>
  </div>
  <div id="filters"></div>
  <div class="page-body" id="page-body"></div>
  <div class="page-footer">built with ❤️ by e11i</div>
</div>
<script src="utils.js?v=5"></script>
<script src="../data.js"></script>
<script>
const catMeta = {
  'accessibility':  { icon: 'eye', label: 'Accessibility' },
  'ai-tools':       { icon: 'cpu', label: 'AI Tools' },
  'inspiration':    { icon: 'sparkles', label: 'Inspiration' },
  'to-install':     { icon: 'download', label: 'To Install' },
  'to-read':        { icon: 'book-open', label: 'To Read' },
  'blog-material':  { icon: 'pen-line', label: 'Blog Material' },
};

document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  const resources = d.resources || [];
  if (!resources.length) {
    document.getElementById('page-body').innerHTML = '<div class="empty">No resources saved yet</div>';
    return;
  }

  // Get unique categories + statuses
  const cats = [...new Set(resources.map(r => r.category))];
  const statuses = [...new Set(resources.map(r => r.status))];

  // Build filter pills
  let filterHtml = '<div class="filters">';
  filterHtml += '<span class="filter-pill active" data-filter="all">All</span>';
  cats.forEach(c => {
    const meta = catMeta[c] || { label: c };
    filterHtml += `<span class="filter-pill" data-filter="cat:${c}">${meta.label}</span>`;
  });
  statuses.forEach(s => {
    filterHtml += `<span class="filter-pill" data-filter="status:${s}">${s}</span>`;
  });
  filterHtml += '</div>';
  document.getElementById('filters').innerHTML = filterHtml;

  function renderResources(filter) {
    let filtered = resources;
    if (filter && filter !== 'all') {
      if (filter.startsWith('cat:')) {
        filtered = resources.filter(r => r.category === filter.slice(4));
      } else if (filter.startsWith('status:')) {
        filtered = resources.filter(r => r.status === filter.slice(7));
      }
    }

    // Group by category
    const groups = {};
    filtered.forEach(r => {
      const cat = r.category || 'other';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(r);
    });

    // Sort: new first, then explored, then skipped
    const statusOrder = { 'new': 0, 'explored': 1, 'shared-with-work': 2, 'skipped': 3 };

    let html = '';
    const catOrder = Object.keys(catMeta);
    const activeCats = catOrder.filter(c => groups[c]);
    Object.keys(groups).forEach(c => { if (!catOrder.includes(c)) activeCats.push(c); });

    activeCats.forEach(cat => {
      const items = groups[cat].sort((a,b) => (statusOrder[a.status]||0) - (statusOrder[b.status]||0));
      const meta = catMeta[cat] || { icon: 'link', label: cat };

      html += `<div class="cat-section">
        <div class="cat-header">
          <i data-lucide="${meta.icon}"></i> ${meta.label}
          <span class="cat-count">${items.length}</span>

</div>

<script>
        const safeStatus = ['new','explored','archived'].includes(r.status) ? r.status : 'new';
        const statusCls = 'status-' + safeStatus;
        const safeUrl = /^https?:\/\//i.test(r.url) ? esc(r.url) : '#';
        let takeawaysHtml = '';
        if (r.takeaways && r.takeaways.length) {
          const items = r.takeaways.map(t => {
            const escapedT = esc(t);
            const hasTodo = t.includes('TODO:');
            const text = hasTodo ? escapedT.replace('TODO:', '<span class="todo-tag">TODO</span>') : escapedT;
            return `<div class="takeaway">${text}</div>`;
          }).join('');
          takeawaysHtml = `<div class="takeaways"><div class="takeaways-label">Takeaways</div>${items}</div>`;
        }
        html += `<div class="resource ${statusCls}">
          <div class="resource-top">
            <a href="${safeUrl}" target="_blank" rel="noopener noreferrer" class="resource-title">${esc(r.title)}</a>
            <div class="resource-tags">
              <span class="tag tag-status ${safeStatus}">${esc(safeStatus)}</span>
              <span class="resource-date">${esc(r.added || '')}</span>
            </div>
          </div>
          ${r.note ? `<div class="resource-note">${esc(r.note)}</div>` : ''}
          ${takeawaysHtml}
        </div>`;
      });

      html += '</div>';
    });

    document.getElementById('page-body').innerHTML = html;
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }

  // Filter click handlers
  document.querySelectorAll('.filter-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      renderResources(pill.dataset.filter);
    });
  });

  renderResources('all');
});
</script>
</body>
</html>
