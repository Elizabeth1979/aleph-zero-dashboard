<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>Scheduled Jobs — Hermes</title>
<link rel="stylesheet" href="../theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="shared.css">

<style>
  /* ── Card grid ──────────────────────────────── */
  .cron-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: var(--s4);
    align-items: start;
  }

  .cron-card {
    background: var(--bg-card, var(--bg-inset));
    border: 1px solid var(--border);
    border-radius: var(--r2, 10px);
    padding: var(--s4);
    display: flex;
    flex-direction: column;
    gap: var(--s3);
    transition: border-color 0.2s ease;
  }
  .cron-card:hover {
    border-color: var(--accent-dim, rgba(255,255,255,0.12));
  }

  /* Header row: dot + name + skill tag */
  .cron-header {
    display: flex;
    align-items: center;
    gap: var(--s2);
    flex-wrap: wrap;
  }
  .cron-header .cron-name {
    font-size: var(--fs-sm);
    font-weight: 600;
    color: var(--text);
  }

  /* Schedule + next run on one line */
  .cron-schedule {
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }
  .cron-schedule .next {
    color: var(--text-3);
    font-weight: 400;
  }

  /* Task bullets — no label */
  .cron-tasks {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 0;
    margin: 0;
  }
  .cron-task {
    display: flex;
    align-items: flex-start;
    gap: var(--s2);
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.4;
  }
  .cron-task::before {
    content: '·';
    color: var(--accent-dim);
    flex-shrink: 0;
    font-weight: 700;
  }

  /* Last run row */
  .cron-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--s3);
    margin-top: auto;
    padding-top: var(--s2);
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .cron-last-run {
    font-size: 12px;
    color: var(--text-3);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .cron-last-run .check { color: var(--ok); }
  .cron-last-run .fail  { color: var(--warn); }

  /* Prompt toggle — inline expand per card */
  .cron-card details { margin: 0; }
  .cron-card details summary { list-style: none; }
  .cron-card details summary::-webkit-details-marker { display: none; }

  /* Prompt modal overlay */
  .prompt-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--s6);
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s ease, visibility 0.2s ease;
  }
  .prompt-overlay.open {
    opacity: 1;
    visibility: visible;
  }
  .prompt-modal {
    background: var(--bg-card, var(--bg-inset));
    border: 1px solid var(--border);
    border-radius: var(--r2, 10px);
    padding: var(--s5);
    max-width: 640px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: var(--s3);
    transform: translateY(8px);
    transition: transform 0.2s ease;
  }
  .prompt-overlay.open .prompt-modal {
    transform: translateY(0);
  }
  .prompt-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--s3);
  }
  .prompt-modal-header h2 {
    font-size: var(--fs-sm);
    font-weight: 600;
    color: var(--text);
    margin: 0;
  }
  .prompt-modal-close {
    background: none;
    border: none;
    color: var(--text-3);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    transition: color 0.15s ease;
  }
  .prompt-modal-close:hover { color: var(--text); }
  .prompt-modal-body {
    font-size: var(--fs-sm);
    color: var(--text-2);
    word-break: break-word;
    line-height: 1.6;
    padding: var(--s4);
    background: var(--bg-inset);
    border-radius: var(--r1);
  }
  .prompt-modal-body h1, .prompt-modal-body h2, .prompt-modal-body h3 {
    color: var(--text);
    margin: 0.8em 0 0.4em;
  }
  .prompt-modal-body h1 { font-size: 1.1em; }
  .prompt-modal-body h2 { font-size: 1em; }
  .prompt-modal-body h3 { font-size: 0.95em; }
  .prompt-modal-body p { margin: 0.4em 0; }
  .prompt-modal-body ol, .prompt-modal-body ul { padding-left: 1.4em; margin: 0.4em 0; }
  .prompt-modal-body li { margin: 0.3em 0; }
  .prompt-modal-body code {
    font-family: var(--mono);
    font-size: 0.9em;
    background: rgba(255,255,255,0.06);
    padding: 0.1em 0.4em;
    border-radius: 3px;
  }
  .prompt-modal-body pre.code-block {
    background: rgba(0,0,0,0.3);
    padding: var(--s3);
    border-radius: var(--r1);
    overflow-x: auto;
    margin: 0.5em 0;
  }
  .prompt-modal-body strong { color: var(--text); }

  /* LOCKED — Clickable card: whole card opens prompt modal */
  .cron-card.clickable { cursor: pointer; transition: border-color 0.15s ease; }
  .cron-card.clickable:hover { border-color: var(--accent); }

  /* LOCKED — View prompt label in footer */
  .prompt-link {
    font-size: 12px;
    color: var(--text-3);
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  /* Mobile */
  @media (max-width: 480px) {
    .cron-grid { grid-template-columns: 1fr; }
    .cron-card { padding: var(--s3); }
    .prompt-overlay { padding: var(--s3); }
  }
</style>
</head>
<body>
<div class="page-wrap">
  <header class="site-header">
    <a href="../index.html" class="site-logo">Hermes — Elli's Agent AI</a>
  </header>
  <h1 class="page-title"><i data-lucide="clock"></i> Scheduled Jobs</h1>
  <div class="page-body" id="page-body"></div>
  <div class="page-footer">built with ❤️ by e11i</div>
</div>
<script src="utils.js?v=5"></script>
<script src="../data.js"></script>
<script>

/* ── Helpers ──────────────────────────────────────────────────────────── */

function fmtDate(iso) {
  if (!iso) return null;
  try {
    const d = new Date(iso);
    if (isNaN(d)) return null;
    const now = new Date();
    const diff = d - now;
    const absDiff = Math.abs(diff);
    if (absDiff < 86400000) {
      const mins = Math.round(diff / 60000);
      if (mins > 0)  return `in ${mins < 60 ? mins + ' min' : Math.round(mins/60) + ' hr'}`;
      if (mins < 0)  return `${Math.abs(mins) < 60 ? Math.abs(mins) + ' min ago' : Math.round(Math.abs(mins)/60) + ' hr ago'}`;
      return 'just now';
    }
    const opts = { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' };
    if (d.getFullYear() !== now.getFullYear()) opts.year = 'numeric';
    return d.toLocaleString(undefined, opts);
  } catch(e) { return iso; }
}

function scheduleLabel(j) {
  const expr = (typeof j.schedule === 'object')
    ? (j.schedule?.display || j.schedule?.expr || '')
    : (j.schedule || '');
  if (!expr) return j.repeat_display || '?';
  const p = expr.trim().split(/\s+/);
  if (p.length === 5) {
    const [min, hr, dom, mon, dow] = p;
    const h = +hr, m = +min;
    const t = `${h > 12 ? h-12 : h||12}:${String(m).padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
    const ordinals = ['','1st','2nd','3rd','4th','5th','6th','7th','8th','9th','10th',
      '11th','12th','13th','14th','15th','16th','17th','18th','19th','20th',
      '21st','22nd','23rd','24th','25th','26th','27th','28th','29th','30th','31st'];
    if (dom !== '*' && mon === '*' && dow === '*') {
      return `Monthly on the ${ordinals[+dom] || dom} at ${t}`;
    }
    const label = cronHuman(expr);
    if (label !== expr) return label;
  }
  return expr;
}

/**
 * extractTasks(prompt) → string[]
 * Pulls up to 3 short action bullets from a prompt string.
 */
function extractTasks(prompt) {
  if (!prompt) return [];
  const text = prompt.trim();
  const tasks = [];

  // 1. Numbered list items
  const numbered = [...text.matchAll(/^\s*\d+[.)]\s+(.+)/gm)];
  for (const m of numbered) {
    if (tasks.length >= 3) break;
    let cleaned = m[1].trim().replace(/\*\*/g, '').replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}\u{FE0F}\u{200D}]+/gu, '').replace(/^\s*—\s*/, '').trim();
    // Take just the title part (before the em-dash or colon explanation)
    const titleMatch = cleaned.match(/^([^—–:]+)/);
    if (titleMatch) cleaned = titleMatch[1].trim();
    if (cleaned.length > 2) tasks.push(cleaned.length > 50 ? cleaned.slice(0, 47) + '…' : cleaned);
  }
  if (tasks.length >= 2) return tasks;

  // 2. "check for ..."
  const checkPat = /\b(?:check|look|search)\s+for\s+([^.!\n]{5,60})/gi;
  for (const m of text.matchAll(checkPat)) {
    if (tasks.length >= 3) break;
    let s = m[1].trim().replace(/\.$/, '');
    if (s.length > 50) s = s.slice(0, 47) + '…';
    if (!tasks.some(f => f.toLowerCase().includes(s.slice(0,20).toLowerCase()))) tasks.push(s);
  }
  if (tasks.length) return tasks;

  // 3. Fallback: first sentence
  const first = text.replace(/\n+/g, ' ').slice(0, 80).replace(/\.$/, '');
  return [first.length < text.length ? first + '…' : first];
}

/* ── Render ───────────────────────────────────────────────────────────── */

document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  // Only show recurring jobs (repeat.times === null means forever)
  const jobs = (d.cron_jobs || []).filter(j => !j.repeat || j.repeat.times === null || j.repeat.times === undefined);
  if (!jobs.length) {
    document.getElementById('page-body').innerHTML = '<div class="empty">No scheduled jobs</div>';
    return;
  }

  document.getElementById('page-body').innerHTML = '<div class="cron-grid">' + jobs.map(j => {
    const enabled  = j.enabled !== false;
    const name     = esc(j.name || j.job_id || j.id || 'Unnamed');
    const sched    = esc(scheduleLabel(j));
    const nextRun  = fmtDate(j.next_run_at);
    const lastRun  = fmtDate(j.last_run_at);
    const status   = (j.last_status || '').toLowerCase();
    const isOk     = status === 'ok' || status === 'success' || status === 'done';
    const isErr    = status && !isOk;
    const tasks    = j.prompt ? extractTasks(j.prompt) : [];

    /* Skill tags */
    const skillTags = j.skills && j.skills.length
      ? j.skills.map(s => `<span class="tag">${esc(s)}</span>`).join('')
      : '';

    /* Task bullets */
    const tasksHtml = tasks.length
      ? `<div class="cron-tasks">${tasks.map(t => `<span class="cron-task">${esc(t)}</span>`).join('')}</div>`
      : '';

    /* Last run with check/fail icon */
    const lastRunHtml = lastRun
      ? `<span class="cron-last-run">Last run: ${esc(lastRun)} ${isOk ? '<span class="check">✓</span>' : isErr ? '<span class="fail">✗</span>' : ''}</span>`
      : '<span class="cron-last-run">No runs yet</span>';

    const hasPrompt = !!j.prompt;
    const promptAttr = hasPrompt
      ? ` data-prompt="${esc(j.prompt).replace(/"/g, '&quot;')}" data-name="${name}"`
      : '';

    return `<div class="cron-card${hasPrompt ? ' clickable' : ''}"${promptAttr}>
      <div class="cron-header">
        <span class="dot ${enabled ? 'on' : 'off'}" title="${enabled ? 'Enabled' : 'Disabled'}"></span>
        <span class="cron-name">${name}</span>
        ${skillTags}
      </div>
      <span class="cron-schedule">${sched}${nextRun ? ` <span class="next">· ${esc(nextRun)}</span>` : ''}</span>
      ${tasksHtml}
      <div class="cron-footer">
        ${lastRunHtml}
        ${hasPrompt ? `<span class="prompt-link"><i data-lucide="file-text" style="width:12px;height:12px"></i>View prompt</span>` : ''}
      </div>
    </div>`;
  }).join('') + '</div>';

  /* ── Prompt modal ──────────────────────────────────────────────────── */
  const overlay = document.createElement('div');
  overlay.className = 'prompt-overlay';
  overlay.innerHTML = `<div class="prompt-modal">
    <div class="prompt-modal-header">
      <h2 class="prompt-modal-title"></h2>
      <button class="prompt-modal-close"><i data-lucide="x" style="width:16px;height:16px"></i></button>
    </div>
    <div class="prompt-modal-body"></div>
  </div>`;
  document.body.appendChild(overlay);

  const closeModal = () => overlay.classList.remove('open');
  overlay.querySelector('.prompt-modal-close').addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  document.querySelectorAll('.cron-card.clickable').forEach(card => {
    card.addEventListener('click', () => {
      overlay.querySelector('.prompt-modal-title').textContent = card.dataset.name;
      overlay.querySelector('.prompt-modal-body').innerHTML = renderMd(card.dataset.prompt);
      overlay.classList.add('open');
    });
  });

  if (typeof lucide !== 'undefined') lucide.createIcons();
});

</script>
<link rel="stylesheet" href="../a11y-tester.css">
<script src="../a11y-widget.js"></script>
<script src="../a11y-tester.js"></script>
</body>
</html>
