<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scheduled Jobs — Hermes</title>
<link rel="stylesheet" href="../theme.css?v=3">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="../a11y-widget.css">
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <h1 class="page-title"><i data-lucide="clock"></i> Scheduled Jobs</h1>
  </div>
  <div class="page-body" id="page-body"></div>
</div>
<script src="utils.js"></script>
<script src="../data.js"></script>
<script>

document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  const jobs = d.cron_jobs || [];
  if (!jobs.length) { document.getElementById('page-body').innerHTML = '<div class="empty">No jobs</div>'; return; }
  document.getElementById('page-body').innerHTML = jobs.map(j => {
    const next = j.next_run_at ? new Date(j.next_run_at).toLocaleString() : '';
    const sched = cronHuman(j.schedule);
    const enabled = j.enabled !== false;
    return `<div class="cron">
      <div class="cron-top">
        <span class="dot ${enabled?'on':'off'}"></span>
        <span class="cron-name">${esc(j.name || j.job_id || j.id || 'Unnamed')}</span>
        <span class="tag tag-accent">${sched}</span>
        <span class="tag">${esc(j.deliver || 'local')}</span>
        ${j.skills ? j.skills.map(s => `<span class="tag">${esc(s)}</span>`).join('') : ''}
      </div>
      ${next ? `<div class="cron-meta">Next: ${next}</div>` : ''}
      ${j.prompt ? `<details><summary class="cron-prompt"><i data-lucide="chevron-right" style="width:12px;height:12px"></i>Prompt</summary><div class="cron-prompt-box">${esc(j.prompt)}</div></details>` : ''}
    </div>`;
  }).join('');
  // Accordion: only one details open at a time
  document.querySelectorAll('details').forEach(det => {
    det.addEventListener('toggle', () => {
      if (det.open) {
        document.querySelectorAll('details').forEach(other => {
          if (other !== det) other.removeAttribute('open');
        });
      }
    });
  });
  if (typeof lucide !== 'undefined') lucide.createIcons();
});

</script>
<script src="../a11y-widget.js"></script>
</body>
</html>
