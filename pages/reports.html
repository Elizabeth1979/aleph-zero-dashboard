<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports — Hermes</title>
<link rel="stylesheet" href="../theme.css?v=3">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    font-family: var(--sans);
    font-size: var(--fs-base);
    color: var(--text);
    background: var(--bg);
    min-height: 100vh;
  }
  .page-wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .page-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .back-link {
    color: var(--accent);
    text-decoration: none;
    font-size: var(--fs-sm);
    display: flex;
    align-items: center;
    gap: .3rem;
  }
  .back-link:hover { text-decoration: underline; }
  .page-title {
    font-family: var(--mono);
    font-size: var(--fs-2xl);
    font-weight: 700;
    color: var(--text);
  }

  .report-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
    cursor: pointer;
    transition: border-color .2s;
  }
  .report-card:hover { border-color: var(--accent); }
  .report-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: .5rem;
  }
  .report-title {
    font-family: var(--mono);
    font-size: var(--fs-lg);
    font-weight: 600;
    color: var(--text);
  }
  .report-date {
    font-size: var(--fs-sm);
    color: var(--text-2);
    white-space: nowrap;
  }
  .report-preview {
    font-size: var(--fs-sm);
    color: var(--text-3);
    margin-bottom: .75rem;
  }
  .severity-pills {
    display: flex;
    gap: .5rem;
    flex-wrap: wrap;
  }
  .pill-critical {
    background: rgba(239, 68, 68, 0.15);
    color: #f87171;
    font-size: var(--fs-xs);
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 500;
  }
  .pill-medium {
    background: rgba(251, 146, 60, 0.15);
    color: #fb923c;
    font-size: var(--fs-xs);
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 500;
  }
  .pill-low {
    background: rgba(250, 204, 21, 0.15);
    color: #fbbf24;
    font-size: var(--fs-xs);
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 500;
  }

  /* Expanded report content */
  .report-body {
    display: none;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: var(--fs-sm);
    color: var(--text-2);
    line-height: 1.7;
    white-space: pre-wrap;
    font-family: var(--sans);
  }
  .report-body.show { display: block; }

  .report-body h1, .report-body h2, .report-body h3 {
    font-family: var(--mono);
    color: var(--text);
    margin: 1.25rem 0 .5rem;
  }
  .report-body h1 { font-size: var(--fs-xl); }
  .report-body h2 { font-size: var(--fs-lg); }
  .report-body h3 { font-size: var(--fs-base); }
  .report-body code {
    background: var(--bg);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: var(--fs-xs);
  }
  .report-body pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .75rem 1rem;
    overflow-x: auto;
    margin: .5rem 0;
    font-family: var(--mono);
    font-size: var(--fs-xs);
    white-space: pre;
  }
  .report-body table {
    width: 100%;
    border-collapse: collapse;
    margin: .75rem 0;
    font-size: var(--fs-xs);
  }
  .report-body th, .report-body td {
    text-align: left;
    padding: .4rem .6rem;
    border-bottom: 1px solid var(--border);
  }
  .report-body th {
    color: var(--text);
    font-weight: 600;
  }
  .report-body ul, .report-body ol {
    padding-left: 1.5rem;
    margin: .5rem 0;
  }
  .report-body li { margin-bottom: .25rem; }

  .empty {
    text-align: center;
    color: var(--text-3);
    padding: 3rem;
    font-size: var(--fs-sm);
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .page-wrap { padding: 1rem; }
    .report-header { flex-direction: column; align-items: flex-start; gap: .25rem; }
    .report-title { font-size: var(--fs-base); }
  }
</style>
<link rel="stylesheet" href="../a11y-widget.css">
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <div class="page-title">Reports</div>
  </div>
  <div id="page-body"></div>
</div>

<script src="../data.js"></script>
<script>
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMarkdown(md) {
  // Simple markdown to HTML
  let html = esc(md);

  // Code blocks first (before other rules)
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return '<pre><code>' + code.trim() + '</code></pre>';
  });

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

  // Tables
  html = html.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)*)/gm, (_, header, sep, rows) => {
    const ths = header.split('|').filter(c => c.trim()).map(c => '<th>' + c.trim() + '</th>').join('');
    const trs = rows.trim().split('\n').map(row => {
      const tds = row.split('|').filter(c => c.trim()).map(c => '<td>' + c.trim() + '</td>').join('');
      return '<tr>' + tds + '</tr>';
    }).join('');
    return '<table><thead><tr>' + ths + '</tr></thead><tbody>' + trs + '</tbody></table>';
  });

  // Unordered lists
  html = html.replace(/^- \[ \] (.+)$/gm, '<li>☐ $1</li>');
  html = html.replace(/^- \[x\] (.+)$/gm, '<li>☑ $1</li>');
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

  // Ordered lists
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

  // Horizontal rules
  html = html.replace(/^---$/gm, '<hr>');

  // Clean up extra newlines
  html = html.replace(/\n{3,}/g, '\n\n');

  return html;
}

document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__ || {};
  const reports = d.reports || [];
  const el = document.getElementById('page-body');

  if (!reports.length) {
    el.innerHTML = '<div class="empty">No reports yet</div>';
    if (typeof lucide !== 'undefined') lucide.createIcons();
    return;
  }

  let html = '';
  reports.forEach((r, i) => {
    const pills = [];
    if (r.critical) pills.push('<span class="pill-critical">' + r.critical + ' critical</span>');
    if (r.medium) pills.push('<span class="pill-medium">' + r.medium + ' medium</span>');
    if (r.low) pills.push('<span class="pill-low">' + r.low + ' low</span>');

    html += '<div class="report-card" onclick="toggleReport(' + i + ')">';
    html += '  <div class="report-header">';
    html += '    <div class="report-title">' + esc(r.title) + '</div>';
    html += '    <div class="report-date">' + esc(r.date) + '</div>';
    html += '  </div>';
    html += '  <div class="report-preview">' + esc(r.preview) + '</div>';
    html += '  <div class="severity-pills">' + pills.join('') + '</div>';
    html += '  <div class="report-body" id="report-' + i + '">' + renderMarkdown(r.content) + '</div>';
    html += '</div>';
  });

  el.innerHTML = html;
  if (typeof lucide !== 'undefined') lucide.createIcons();
});

function toggleReport(i) {
  const body = document.getElementById('report-' + i);
  if (body) body.classList.toggle('show');
}
</script>
<script src="../a11y-widget.js"></script>
</body>
</html>
