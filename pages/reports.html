<div class="page-wrap">

    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard

    <div class="page-title">Reports</div>

  <div class="page-footer">built with ❤️ by e11i</div>
</div>

<script>
<script src="../data.js"></script>
<script>

function renderMarkdown(md) {
  // Simple markdown to HTML
  let html = esc(md);

  // Code blocks first (before other rules)
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return '<pre><code>' + code.trim() + '</code></pre>';
  });

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

  // Tables
  html = html.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)*)/gm, (_, header, sep, rows) => {
    const ths = header.split('|').filter(c => c.trim()).map(c => '<th>' + c.trim() + '</th>').join('');
    const trs = rows.trim().split('\n').map(row => {
      const tds = row.split('|').filter(c => c.trim()).map(c => '<td>' + c.trim() + '</td>').join('');
      return '<tr>' + tds + '</tr>';
    }).join('');
    return '<table><thead><tr>' + ths + '</tr></thead><tbody>' + trs + '</tbody></table>';
  });

  // Unordered lists
  html = html.replace(/^- \[ \] (.+)$/gm, '<li>☐ $1</li>');
  html = html.replace(/^- \[x\] (.+)$/gm, '<li>☑ $1</li>');
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

  // Ordered lists
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

  // Horizontal rules
  html = html.replace(/^---$/gm, '<hr>');

  // Clean up extra newlines
  html = html.replace(/\n{3,}/g, '\n\n');

  return html;
}

document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__ || {};
  const reports = d.reports || [];
  const el = document.getElementById('page-body');

  if (!reports.length) {
    el.innerHTML = '<div class="empty">No reports yet</div>';
    if (typeof lucide !== 'undefined') lucide.createIcons();
    return;
  }

  let html = '';
  reports.forEach((r, i) => {
    const pills = [];
    if (r.critical) pills.push('<span class="pill-critical">' + r.critical + ' critical</span>');
    if (r.medium) pills.push('<span class="pill-medium">' + r.medium + ' medium</span>');
    if (r.low) pills.push('<span class="pill-low">' + r.low + ' low</span>');

    html += '<div class="report-card" onclick="toggleReport(' + i + ')">';
    html += '  <div class="report-header">';
    html += '    <div class="report-title">' + esc(r.title) + '</div>';
    html += '    <div class="report-date">' + esc(r.date) + '</div>';
    html += '  </div>';
    html += '  <div class="report-preview">' + esc(r.preview) + '</div>';
    html += '  <div class="severity-pills">' + pills.join('') + '</div>';
    html += '  <div class="report-body" id="report-' + i + '">' + renderMarkdown(r.content) + '</div>';
    html += '</div>';
  });

  el.innerHTML = html;
  if (typeof lucide !== 'undefined') lucide.createIcons();
});

function toggleReport(i) {
  const body = document.getElementById('report-' + i);
  if (body) body.classList.toggle('show');
}
</script>

<script src="../a11y-tester.js"></script>
</body>
</html>
