<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>Quick Commands — Hermes</title>
<link rel="stylesheet" href="../theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="../a11y-widget.css">
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <h1 class="page-title"><i data-lucide="terminal"></i> Quick Commands</h1>
  </div>
  <div class="page-body" id="page-body"></div>
</div>
<script src="utils.js?v=5"></script>
<script src="../data.js"></script>
<script>

document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  const cmds = d.commands || [];
  if (!cmds.length) { document.getElementById('page-body').innerHTML = '<div class="empty">No commands</div>'; return; }
  document.getElementById('page-body').innerHTML = cmds.map(c =>
    `<div class="cmd-row"><span class="cmd-name">${esc(c.cmd)}</span><span class="cmd-desc">${esc(c.desc)}</span></div>`
  ).join('');
  if (typeof lucide !== 'undefined') lucide.createIcons();

  <div class="page-footer">built with ❤️ by e11i</div>
</div>

<script>
<link rel="stylesheet" href="../a11y-tester.css">
<script src="../a11y-widget.js"></script>
<script src="../a11y-tester.js"></script>
</body>
</html>
