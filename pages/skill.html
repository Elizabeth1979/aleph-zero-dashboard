<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>Skill — Hermes</title>
<link rel="stylesheet" href="../theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <h1 class="page-title" id="page-title"><i data-lucide="puzzle"></i> Skill</h1>
  </div>
  <div class="page-body" id="page-body"></div>
  <div class="page-footer">built with ❤️ by e11i</div>
</div>
<script src="utils.js?v=5"></script>
<script src="../data.js"></script>
<script>

document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  const params = new URLSearchParams(window.location.search);
  const name = params.get('name');
  if (!name) { document.getElementById('page-body').innerHTML = '<div class="empty">No skill specified</div>'; return; }

  const skills = d.skills_data || [];
  const s = skills.find(x => x.name === name);
  if (!s) { document.getElementById('page-body').innerHTML = `<div class="empty">Skill "${esc(name)}" not found</div>`; return; }

  // Mark skill as visited in localStorage
  const visited = JSON.parse(localStorage.getItem('hermes-visited-skills') || '[]');
  if (!visited.includes(s.name)) { visited.push(s.name); localStorage.setItem('hermes-visited-skills', JSON.stringify(visited)); }

  // Update page title
  document.title = `${s.name} — Hermes`;
  document.getElementById('page-title').innerHTML = `<i data-lucide="puzzle"></i> ${esc(s.name)}`;

  // Build meta tags
  let meta = `<div class="skill-meta">`;
  meta += `<span class="tag tag-accent">${esc(s.category)}</span>`;
  if (s.custom) meta += `<span class="tag tag-custom">★ Custom</span>`;
  if (s.in_use) meta += `<span class="tag tag-custom">In Use</span>`;
  meta += `</div>`;

  // Content — strip YAML frontmatter and render markdown
  const body = stripFrontmatter(s.content || '');
  const html = meta + `<div class="skill-content modal-editor rendered-md">${renderMd(body)}</div>`;
  document.getElementById('page-body').innerHTML = html;
  if (typeof lucide !== 'undefined') lucide.createIcons();
});
</script>
</body>
</html>
