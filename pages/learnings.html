<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>Learnings — Aleph Zero</title>
<link rel="stylesheet" href="../theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="shared.css">
<style>
  .learning-entry { 
    background: var(--card); 
    border: 1px solid var(--border); 
    border-radius: 12px; 
    padding: 1.25rem; 
    margin-bottom: 1rem; 
  }
  .learning-date { 
    font-size: 0.75rem; 
    color: var(--muted); 
    margin-bottom: 0.25rem; 
  }
  .learning-title { 
    font-weight: 600; 
    color: var(--fg); 
    margin-bottom: 0.5rem; 
    font-size: 1rem; 
  }
  .learning-category { 
    display: inline-block; 
    font-size: 0.7rem; 
    padding: 2px 8px; 
    border-radius: 999px; 
    background: var(--accent-bg, rgba(94,234,212,0.12)); 
    color: var(--accent, #5eead4); 
    font-weight: 500; 
    margin-bottom: 0.5rem; 
  }
  .learning-body { 
    font-size: 0.875rem; 
    color: var(--muted); 
    line-height: 1.6; 
  }
  .stats-row {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    flex: 1;
    text-align: center;
  }
  .stat-num {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent, #5eead4);
  }
  .stat-label {
    font-size: 0.75rem;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <h1 class="page-title"><i data-lucide="lightbulb"></i> Learnings</h1>
  </div>
  <div class="page-body" id="page-body"></div>
  <div class="page-footer">built with ❤️ by e11i</div>
</div>
<script src="utils.js"></script>
<script src="../data.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  const raw = (d.memory_files && d.memory_files.learnings) || '';
  
  // Parse entries (split on ## headings)
  const entries = [];
  const parts = raw.split(/^## /m).filter(e => e.trim() && !e.startsWith('#'));
  
  for (const part of parts) {
    const lines = part.split('\n');
    const header = lines[0].trim(); // "2026-04-04 — Title"
    const dateMatch = header.match(/^(\d{4}-\d{2}-\d{2})\s*[—–-]\s*(.+)/);
    const date = dateMatch ? dateMatch[1] : '';
    const title = dateMatch ? dateMatch[2] : header;
    
    let category = '';
    let bodyLines = [];
    for (let i = 1; i < lines.length; i++) {
      const catMatch = lines[i].match(/^\*\*Category:\*\*\s*(.+)/);
      if (catMatch) {
        category = catMatch[1].trim();
      } else if (lines[i].trim()) {
        bodyLines.push(lines[i].trim());
      }
    }
    
    entries.push({ date, title, category, body: bodyLines.join(' ') });
  }
  
  // Count categories
  const cats = {};
  entries.forEach(e => { if (e.category) cats[e.category] = (cats[e.category] || 0) + 1; });
  const topCat = Object.entries(cats).sort((a,b) => b[1] - a[1])[0];
  
  let html = '<div class="stats-row">';
  html += `<div class="stat-card"><div class="stat-num">${entries.length}</div><div class="stat-label">Total Learnings</div></div>`;
  html += `<div class="stat-card"><div class="stat-num">${Object.keys(cats).length}</div><div class="stat-label">Categories</div></div>`;
  if (topCat) html += `<div class="stat-card"><div class="stat-num">${topCat[0]}</div><div class="stat-label">Most Common</div></div>`;
  html += '</div>';
  
  // Render entries (newest first)
  entries.reverse();
  for (const e of entries) {
    html += '<div class="learning-entry">';
    html += `<div class="learning-date">${e.date}</div>`;
    if (e.category) html += `<span class="learning-category">${e.category}</span>`;
    html += `<div class="learning-title">${e.title}</div>`;
    html += `<div class="learning-body">${e.body}</div>`;
    html += '</div>';
  }
  
  if (entries.length === 0) {
    html = '<p style="color:var(--muted)">No learnings yet.</p>';
  }
  
  document.getElementById('page-body').innerHTML = html;
  lucide.createIcons();
});
</script>
</body>
</html>
