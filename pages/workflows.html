<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>Workflows — Hermes</title>
<link rel="stylesheet" href="../theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="shared.css">
<style>
  /* ── Workflow grid ───────────────────────────────────────── */
  .wf-grid {
    display: grid;
    gap: var(--s4);
  }

  /* ── Workflow card ───────────────────────────────────────── */
  .wf-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: var(--s5) var(--s5) var(--s4);
    transition: border-color var(--transition);
  }
  .wf-card:hover {
    border-color: var(--border-hover);
  }

  /* ── Card header ─────────────────────────────────────────── */
  .wf-header {
    display: flex;
    align-items: center;
    gap: var(--s3);
    margin-bottom: var(--s3);
    flex-wrap: wrap;
  }
  .wf-icon {
    width: 36px;
    height: 36px;
    border-radius: var(--r1);
    background: var(--accent-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .wf-icon svg {
    width: 18px;
    height: 18px;
    color: var(--accent);
  }
  .wf-title {
    font-size: var(--fs-lg);
    font-weight: 600;
    color: var(--text);
    flex: 1;
    min-width: 0;
  }

  /* ── Badges ──────────────────────────────────────────────── */
  .badge-auto {
    font-size: var(--fs-xs);
    font-weight: 500;
    padding: 3px 10px;
    border-radius: var(--pill);
    background: var(--accent-muted);
    color: var(--accent);
    white-space: nowrap;
  }
  .badge-manual {
    font-size: var(--fs-xs);
    font-weight: 500;
    padding: 3px 10px;
    border-radius: var(--pill);
    background: rgba(255,255,255,0.05);
    color: var(--text-2);
    white-space: nowrap;
  }

  /* ── Description ─────────────────────────────────────────── */
  .wf-desc {
    font-size: var(--fs-sm);
    color: var(--text-2);
    margin-bottom: var(--s4);
    line-height: 1.6;
  }

  /* ── Schedule strip ──────────────────────────────────────── */
  .wf-schedule {
    display: inline-flex;
    align-items: center;
    gap: var(--s2);
    font-size: var(--fs-xs);
    font-family: var(--mono);
    color: var(--accent-dim);
    background: rgba(47,180,166,0.08);
    border: 1px solid rgba(47,180,166,0.18);
    border-radius: var(--r1);
    padding: 4px 10px;
    margin-bottom: var(--s4);
  }
  .wf-schedule svg {
    width: 13px;
    height: 13px;
  }

  /* ── How-to-close strip ──────────────────────────────────── */
  .wf-howto {
    display: inline-flex;
    align-items: center;
    gap: var(--s2);
    font-size: var(--fs-xs);
    color: var(--text-3);
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: var(--r1);
    padding: 4px 10px;
    margin-bottom: var(--s4);
  }
  .wf-howto svg {
    width: 13px;
    height: 13px;
  }

  /* ── Roles row ───────────────────────────────────────────── */
  .wf-roles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--s3);
  }
  @media (max-width: 500px) {
    .wf-roles { grid-template-columns: 1fr; }
  }

  .role-block {
    border-radius: var(--r1);
    padding: var(--s3) var(--s4);
  }
  .role-block.you {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .role-block.bot {
    background: rgba(47,180,166,0.07);
    border: 1px solid rgba(47,180,166,0.18);
  }

  .role-label {
    font-size: var(--fs-xs);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: var(--s2);
  }
  .role-block.you .role-label { color: var(--text-3); }
  .role-block.bot .role-label { color: var(--accent-dim); }

  .role-text {
    font-size: var(--fs-sm);
    line-height: 1.6;
  }
  .role-block.you .role-text { color: var(--text); }
  .role-block.bot .role-text { color: var(--text-2); }

  /* ── View hint ───────────────────────────────────────────── */
  .wf-view {
    margin-top: var(--s3);
    font-size: var(--fs-xs);
    color: var(--text-3);
    display: flex;
    align-items: center;
    gap: var(--s2);
  }
  .wf-view svg { width: 12px; height: 12px; }

  /* ── Section count ───────────────────────────────────────── */
  .page-subtitle {
    font-size: var(--fs-sm);
    color: var(--text-3);
    margin-top: calc(-1 * var(--s5));
    margin-bottom: var(--s6);
  }
</style>
</head>
<body>
<div class="page-wrap">

  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <h1 class="page-title"><i data-lucide="route"></i> Workflows</h1>
  </div>

  <p class="page-subtitle">10 active workflows — how we work together</p>

  <div class="wf-grid" id="page-body"></div>

</div>

<script src="utils.js?v=5"></script>
<script src="../data.js"></script>
<script>
const WORKFLOWS = [
  {
    id: 'thread-discipline',
    icon: 'message-circle',
    title: 'Discord Thread Discipline',
    badge: 'manual',
    badgeLabel: 'You + Bot',
    desc: 'Every conversation happens inside a dedicated thread. One topic per thread — keeps things easy to find and follow.',
    schedule: null,
    howto: 'Long-press thread → Lock Thread → Leave Thread',
    you: 'Open a new thread for each new topic. When the topic is resolved, lock the thread and leave it.',
    bot: 'Suggests opening a new thread if the conversation drifts off-topic. Tracks threads waiting for your reply.',
    view: null,
  },
  {
    id: 'follow-up-pinger',
    icon: 'bell',
    title: 'Thread Follow-up Pinger',
    badge: 'auto',
    badgeLabel: 'Automatic',
    desc: 'A daily check for threads where the bot has been waiting on you for more than 24 hours.',
    schedule: 'Every day at 7:00 PM',
    howto: null,
    you: 'Reply to the thread, or just say "close it" to dismiss.',
    bot: 'Pings you directly in the thread with a reminder of what\'s waiting.',
    view: null,
  },
  {
    id: 'morning-brief',
    icon: 'sun',
    title: 'Morning Brief',
    badge: 'auto',
    badgeLabel: 'Automatic',
    desc: 'A daily digest posted to #dashboard at 8:00 AM — urgent emails, today\'s calendar, open tasks, and AI news.',
    schedule: 'Every day at 8:00 AM',
    howto: null,
    you: 'Just read it in the #dashboard channel.',
    bot: 'Pulls data from Gmail, Google Calendar, your task list, and newsletter summaries.',
    view: null,
  },
  {
    id: 'task-tracking',

    badgeLabel: 'You + Bot',
    desc: 'A living task list you manage through conversation — no separate app needed.',
    schedule: null,
    howto: null,
    you: 'Say "add task: X" or "mark X done" in any thread. The dashboard updates automatically.',
    bot: 'Reads and writes tasks.json, keeps the dashboard Tasks card current.',
    view: 'Dashboard → Tasks card',
  },
  {
    id: 'weekend-review',
    icon: 'calendar',
    title: 'Weekend Review',
    badge: 'auto',
    badgeLabel: 'Automatic',
    desc: 'A weekly summary posted every Friday at noon — what was completed, what\'s still open, and what\'s coming up.',
    schedule: 'Every Friday at 12:00 PM',
    howto: null,
    you: 'Read the summary in #dashboard.',
    bot: 'Reviews the week: completed tasks, open items, and upcoming calendar events.',
    view: null,
  },
  {
    id: 'nightly-memory',
    icon: 'moon',
    title: 'Nightly Memory Consolidation',

    badgeLabel: 'Automatic',
    desc: 'A nightly cleanup that runs at 11:00 PM — optimizes memory, prunes stale data, and keeps things tidy.',

  {
    id: 'wix-stock',

    desc: 'A monthly stock report on the 1st of each month at 10:00 AM — WIX price, trends, and a brief summary.',

    howto: null,
    you: 'Read the report in #dashboard.',
    bot: 'Pulls WIX stock data from the market feed and summarizes recent trends.',
    view: null,
  },
  {
    id: 'a11y-suggester',
    icon: 'accessibility',
    title: 'A11y Task Suggester',
    badge: 'auto',
    badgeLabel: 'Automatic',
    desc: 'A daily nudge at 10:00 AM suggesting the next task to work on for your accessibility app.',
    schedule: 'Every day at 10:00 AM',
    howto: null,
    you: 'Pick up the suggested task, or reply "skip" to pass on it for today.',
    bot: 'Checks the a11y task list and surfaces the next logical item to tackle.',
    view: null,
  },
  {
    id: 'saving-resources',
    icon: 'bookmark',
    title: 'Saving Resources',
    badge: 'manual',
    badgeLabel: 'You + Bot',
    desc: 'Save links, articles, and tools from any conversation for easy reference later.',
    schedule: null,
    howto: null,
    you: 'Drop a link and say "save this" in any thread.',
    bot: 'Adds it to resources.json with a title, category, and note. Appears on the dashboard.',
    view: 'Dashboard → Resources card',
  },
  {
    id: 'research-linking',
    icon: 'book-open',
    title: 'Research & Projects',
    badge: 'manual',
    badgeLabel: 'You + Bot',
    desc: 'Research reports saved to the vault appear automatically on the Reviews & Research page. Link them to projects so they\'re accessible from the Projects page too.',
    schedule: null,
    howto: 'To link a new research file to a project: add the filename to the project\'s `research` array in projects.json. Example: "research": ["My Research File.md"]. The Projects page will show a teal pill linking directly to that report.',
    you: 'Save research markdown files to ~/Desktop/elli vault/A11y App Research/. Tell the bot to link it to a project.',
    bot: 'Adds the filename to the correct project\'s research array in projects.json, runs refresh.sh, and pushes.',
    view: 'Dashboard → Reviews & Research',
  },
];

document.addEventListener('DOMContentLoaded', () => {
  const container = document.getElementById('page-body');

  const html = WORKFLOWS.map(w => {
    const badgeHtml = w.badge === 'auto'
      ? `<span class="badge-auto">${w.badgeLabel}</span>`
      : `<span class="badge-manual">${w.badgeLabel}</span>`;

    const scheduleHtml = w.schedule
      ? `<div class="wf-schedule"><i data-lucide="clock"></i>${w.schedule}</div>`
      : '';

    const howtoHtml = w.howto
      ? `<div class="wf-howto"><i data-lucide="info"></i>${w.howto}</div>`
      : '';

    const viewHtml = w.view
      ? `<div class="wf-view"><i data-lucide="arrow-right"></i>${w.view}</div>`
      : '';

    return `
    <div class="wf-card" id="wf-${w.id}">
      <div class="wf-header">
        <div class="wf-icon"><i data-lucide="${w.icon}"></i></div>
        <span class="wf-title">${w.title}</span>
        ${badgeHtml}
      </div>
      <p class="wf-desc">${w.desc}</p>
      ${scheduleHtml}
      ${howtoHtml}
      <div class="wf-roles">
        <div class="role-block you">
          <div class="role-label">You</div>
          <div class="role-text">${w.you}</div>
        </div>
        <div class="role-block bot">
          <div class="role-label">Bot</div>
          <div class="role-text">${w.bot}</div>
        </div>
      </div>
      ${viewHtml}
    </div>`;
  }).join('');

  container.innerHTML = html;

  if (typeof lucide !== 'undefined') lucide.createIcons();
});
</script>
</body>
</html>
