<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills — Hermes</title>
<link rel="stylesheet" href="../theme.css?v=3">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="shared.css?v=5">
<link rel="stylesheet" href="../a11y-widget.css?v=5">
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <h1 class="page-title"><i data-lucide="puzzle"></i> Skills</h1>
  </div>
  <div class="page-body" id="page-body"></div>
</div>
<script src="utils.js"></script>
<script src="../data.js"></script>
<script>

document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  const skills = d.skills_data || [];
  if (!skills.length) { document.getElementById('page-body').innerHTML = '<div class="empty">No skills</div>'; return; }

  // Separate custom vs built-in, sort custom first
  const customSkills = skills.filter(s => s.custom);
  const builtinSkills = skills.filter(s => !s.custom);

  let html = '';

  // Custom skills section on top
  if (customSkills.length) {
    const customCats = {};
    customSkills.forEach(s => {
      if (!customCats[s.category]) customCats[s.category] = [];
      customCats[s.category].push(s);
    });
    html += '<div style="margin-bottom:var(--s6)"><div class="skill-cat-name" style="color:var(--accent);margin-bottom:var(--s3)">My Custom Skills</div>';
    Object.keys(customCats).sort().forEach(cat => {
      html += `<div class="skill-cat"><div class="skill-cat-name">${esc(cat)}</div><div class="skill-pills">`;
      customCats[cat].forEach(s => {
        html += `<a href="skill.html?name=${encodeURIComponent(s.name)}" class="pill custom in-use">${esc(s.name)}</a>`;
      });
      html += '</div></div>';
    });
    html += '</div>';
  }

  // Built-in skills
  const cats = {};
  builtinSkills.forEach(s => {
    if (!cats[s.category]) cats[s.category] = [];
    cats[s.category].push(s);
  });
  html += '<div>';
  Object.keys(cats).sort().forEach(cat => {
    // Sort in-use skills first within each category
    cats[cat].sort((a, b) => (b.in_use ? 1 : 0) - (a.in_use ? 1 : 0));
    html += `<div class="skill-cat"><div class="skill-cat-name">${esc(cat)}</div><div class="skill-pills">`;
    cats[cat].forEach(s => {
      const cls = s.in_use ? 'pill in-use' : 'pill';
      html += `<a href="skill.html?name=${encodeURIComponent(s.name)}" class="${cls}">${esc(s.name)}</a>`;
    });
    html += '</div></div>';
  });
  html += '</div>';

  document.getElementById('page-body').innerHTML = html;
  if (typeof lucide !== 'undefined') lucide.createIcons();
});

</script>
<script src="../a11y-widget.js"></script>
</body>
</html>
