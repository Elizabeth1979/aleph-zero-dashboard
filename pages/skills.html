<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>Skills — Aleph Zero</title>
<link rel="stylesheet" href="../theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <h1 class="page-title"><i data-lucide="puzzle"></i> Skills</h1>
  </div>
  <div class="page-body" id="page-body"></div>
  <div class="page-footer">built with ❤️ by e11i</div>
</div>
<script src="utils.js?v=5"></script>
<script src="../data.js"></script>
<script>

document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  const skills = d.skills_data || [];
  if (!skills.length) { document.getElementById('page-body').innerHTML = '<div class="empty">No skills</div>'; return; }

  // All skills grouped by category, custom ones get teal star via CSS
  const cats = {};
  skills.forEach(s => {
    if (!cats[s.category]) cats[s.category] = [];
    cats[s.category].push(s);
  });

  let html = '<div>';
  Object.keys(cats).sort().forEach(cat => {
    // Sort custom first, then used, then rest
    cats[cat].sort((a, b) => (b.custom ? 1 : 0) - (a.custom ? 1 : 0) || (b.used ? 1 : 0) - (a.used ? 1 : 0));
    html += `<div class="skill-cat"><div class="skill-cat-name">${esc(cat)}</div><div class="skill-pills">`;
    cats[cat].forEach(s => {
      const cls = ['pill', s.custom ? 'custom' : '', s.used ? 'visited' : ''].filter(Boolean).join(' ');
      html += `<a href="skill.html?name=${encodeURIComponent(s.name)}" class="${cls}">${esc(s.name)}</a>`;
    });
    html += '</div></div>';
  });
  html += '</div>';

  document.getElementById('page-body').innerHTML = html;
  if (typeof lucide !== 'undefined') lucide.createIcons();
});

</script>
</body>
</html>
