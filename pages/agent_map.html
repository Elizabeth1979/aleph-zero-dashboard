<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>Hermes Agent Map — Hermes</title>
<link rel="stylesheet" href="../theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="shared.css">

<style>
.canvas-wrap { overflow:auto; margin-top:var(--s4); padding-bottom:var(--s2); }
.canvas { min-width:1400px; display:grid; grid-template-columns:260px 80px 260px 80px 260px 80px 260px; gap:0; align-items:start; }
.lane { display:flex; flex-direction:column; gap:var(--s3); }
.lane-label { font-size:var(--fs-xs); text-transform:uppercase; letter-spacing:.08em; color:var(--text-3); border-bottom:1px solid var(--border); padding-bottom:var(--s1); margin-bottom:var(--s2); }
.node { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r2); padding:var(--s4); box-shadow:0 6px 20px rgba(0,0,0,.18); }
.node h3 { margin:0 0 var(--s2); font-size:var(--fs-sm); color:var(--accent); }
.node p { margin:0; color:var(--text-3); font-size:var(--fs-sm); line-height:1.5; }
.node ul { margin:var(--s2) 0 0; padding-left:1.1rem; color:var(--text-3); font-size:var(--fs-sm); }
.node li { margin:4px 0; }
.arrow-col { display:flex; align-items:center; justify-content:center; color:var(--accent); font-size:30px; padding-top:90px; }
.mini-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:var(--s3); margin-top:var(--s4); }
.mini-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r2); padding:var(--s4); }
.mini-card strong { display:block; color:var(--text); margin-bottom:6px; }
.mini-card span { color:var(--text-3); font-size:var(--fs-sm); }
</style>
</head>
<body>
<div class="page-wrap">
  <div id="site-header"></div>
  <h1 class="page-title"><i data-lucide="map"></i> Hermes Agent Map</h1>
  <div class="page-body" id="page-body"></div>
  <div class="page-footer">built with ❤️ by e11i</div>
</div>
<script src="utils.js"></script>
<script src="../data.js"></script>
<script>

  html += '</div>';
  html += '<div class="arrow-col">→</div>';

  html += '</div>';
  html += '<div class="arrow-col">→</div>';

  html += '<div class="lane"><div class="lane-label">Automation & Delivery</div>';

  html += '</div></div>';

  html += '<div class="mini-grid">';

  html += '<div class="mini-card"><strong>Projects</strong><span>Where ideas turn into plans, tasks, repos, and implementation.</span></div>';

  html += '<div class="mini-card"><strong>Integrations</strong><span>Discord, Google, MCP, browser, terminal, and GitHub.</span></div>';
