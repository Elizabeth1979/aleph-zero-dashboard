<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sessions — Hermes</title>
<link rel="stylesheet" href="../theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="../a11y-widget.css">
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <h1 class="page-title"><i data-lucide="message-square"></i> Sessions</h1>
  </div>
  <div class="page-body" id="page-body"></div>
</div>
<script src="utils.js?v=5"></script>
<script src="../data.js"></script>
<script>

document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  let html = `<div class="cfg-row"><span class="cfg-key">Total Sessions</span><span class="cfg-val">${d.session_count || 0}</span></div>`;
  const sessions = d.recent_sessions || [];
  if (sessions.length) {
    html += '<div style="margin-top:var(--s5);margin-bottom:var(--s3)"><strong style="color:var(--text-2)">Recent:</strong></div>';
    sessions.forEach(s => {
      const date = s.created ? new Date(s.created).toLocaleString() : '';
      const platform = s.platform ? `<span class="tag" style="margin-left:var(--s2)">${esc(s.platform)}</span>` : '';
      html += `<div class="cfg-row"><span class="cfg-key">${esc(s.title || s.file)}${platform}</span><span class="cfg-val" style="font-size:var(--fs-xs)">${date}</span></div>`;
    });
  }
  document.getElementById('page-body').innerHTML = html;
  if (typeof lucide !== 'undefined') lucide.createIcons();
});

</script>
<link rel="stylesheet" href="../a11y-tester.css">
<script src="../a11y-widget.js"></script>
<script src="../a11y-tester.js"></script>
</body>
</html>
