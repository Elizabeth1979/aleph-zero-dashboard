<style>
  /* ── Cheat sheet sections ──────────────────────────────────── */
  .cs-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    margin-bottom: var(--s4);
    overflow: hidden;
  }

  /* ── Section header (accordion toggle) ───────────────────── */
  .cs-header {
    display: flex;
    align-items: center;
    gap: var(--s3);
    padding: var(--s4) var(--s5);
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: border-color var(--transition), background var(--transition);
  }
  .cs-header:hover {
    background: var(--bg-card-hover);
  }
  .cs-section.open .cs-header {
    border-bottom-color: var(--border);
  }
  .cs-icon {
    width: 32px;
    height: 32px;
    border-radius: var(--r1);
    background: var(--accent-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .cs-icon svg {
    width: 16px;
    height: 16px;
    color: var(--accent);
  }
  .cs-title {
    font-size: var(--fs-base);
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }
  .cs-count {
    font-size: var(--fs-xs);
    color: var(--accent-dim);
    font-family: var(--mono);
    margin-right: var(--s2);
  }
  .cs-chevron {
    width: 16px;
    height: 16px;
    color: var(--text-3);
    transition: transform 0.2s ease;
  }
  .cs-section.open .cs-chevron {
    transform: rotate(90deg);
  }

  /* ── Section body ─────────────────────────────────────────── */
  .cs-body {
    display: none;
    padding: var(--s4) var(--s5);
  }
  .cs-section.open .cs-body {
    display: block;
  }

  /* ── Description under section title ─────────────────────── */
  .cs-desc {
    font-size: var(--fs-sm);
    color: var(--text-3);
    margin-bottom: var(--s4);
  }

  /* ── Sub-groups within a section ─────────────────────────── */
  .cs-group {
    margin-bottom: var(--s5);
  }
  .cs-group:last-child {
    margin-bottom: 0;
  }
  .cs-group-title {
    font-size: var(--fs-xs);
    font-weight: 600;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: var(--s2);
    padding-bottom: var(--s1);
    border-bottom: 1px solid var(--border);
  }

  /* ── Shortcut table ───────────────────────────────────────── */
  .cs-table {
    width: 100%;
    border-collapse: collapse;
  }
  .cs-table tr {
    border-bottom: 1px solid var(--border);
  }
  .cs-table tr:last-child {
    border-bottom: none;
  }
  .cs-table td {
    padding: 7px var(--s2);
    vertical-align: top;
  }
  .cs-table td:first-child {
    width: 42%;
    padding-right: var(--s3);
  }

  /* ── Key badges ──────────────────────────────────────────── */
  .key {
    display: inline-block;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-muted);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    white-space: nowrap;
    margin-right: 3px;
    line-height: 1.6;
  }

  /* ── Description text ────────────────────────────────────── */
  .cs-desc-cell {
    font-size: var(--fs-sm);
    color: var(--text-2);
    line-height: 1.5;
  }
  .cs-desc-cell small {
    display: block;
    font-size: var(--fs-xs);
    color: var(--text-3);
    margin-top: 2px;
  }

  /* ── Note callout ────────────────────────────────────────── */
  .cs-note {
    font-size: var(--fs-xs);
    color: var(--text-3);
    background: var(--bg-inset);
    border: 1px solid var(--border);
    border-radius: var(--r1);
    padding: var(--s2) var(--s3);
    margin-top: var(--s3);
  }

/* ── Render ──────────────────────────────────────────────────── */
function keysHtml(keys) {
  return keys.map(k => `<span class="key">${esc(k)}</span>`).join('');
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderSheets() {
  const container = document.getElementById('cs-container');

  container.innerHTML = SHEETS.map((sheet, si) => {
    const totalRows = sheet.groups.reduce((n, g) => n + g.rows.length, 0);

    const groupsHtml = sheet.groups.map(g => {
      const titleHtml = g.title ? `<div class="cs-group-title">${esc(g.title)}</div>` : '';
      const rowsHtml = g.rows.map(r => `
        <tr>
          <td>${keysHtml(r.keys)}</td>
          <td class="cs-desc-cell">${esc(r.desc)}${r.note ? `<small>${esc(r.note)}</small>` : ''}</td>
        </tr>`).join('');
      return `<div class="cs-group">${titleHtml}<table class="cs-table"><tbody>${rowsHtml}</tbody></table></div>`;
    }).join('');

    const descHtml = sheet.desc ? `<p class="cs-desc">${esc(sheet.desc)}</p>` : '';

    return `
      <div class="cs-section" data-index="${si}">
        <div class="cs-header" onclick="toggleSection(this.parentElement)">
          <div class="cs-icon"><i data-lucide="${sheet.icon}"></i></div>
          <span class="cs-title">${esc(sheet.title)}</span>
          <span class="cs-count">${totalRows} shortcuts</span>
          <svg class="cs-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
        <div class="cs-body">
          ${descHtml}
          ${groupsHtml}
        </div>
      </div>`;
  }).join('');

  if (typeof lucide !== 'undefined') lucide.createIcons();
}

function toggleSection(el) {
  const wasOpen = el.classList.contains('open');
  // accordion — close others
  document.querySelectorAll('.cs-section.open').forEach(s => s.classList.remove('open'));
  if (!wasOpen) el.classList.add('open');
}

document.addEventListener('DOMContentLoaded', () => {
  renderSheets();
  if (typeof lucide !== 'undefined') lucide.createIcons();
});
