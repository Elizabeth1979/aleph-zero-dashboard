<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>Knowledge — Aleph Zero</title>
<link rel="stylesheet" href="../theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="shared.css">
<style>
/* --- Reports card grid + modal --- */
.section-label {
  font-size: 1.1em;
  font-weight: 600;
  color: var(--text, #e2e8f0);
  opacity: 0.7;
  margin: 28px 0 12px;
  letter-spacing: 0.02em;
}
.section-label:first-child { margin-top: 0; }

.card-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 8px;
}
@media (max-width: 960px) { .card-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px) { .card-grid { grid-template-columns: 1fr; } }

.report-card {
  background: var(--card-bg, #1e293b);
  border: 1px solid var(--border, #334155);
  border-radius: 12px;
  height: 220px;
  display: flex;
  flex-direction: column;
  cursor: pointer;
  overflow: hidden;
  transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
  position: relative;
}
.report-card:hover {
  transform: translateY(-2px);
  border-color: var(--accent, #818cf8);
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
}

.card-accent {
  height: 4px;
  flex-shrink: 0;
}
.card-accent.research { background: #14b8a6; }
.card-accent.resource { background: #14b8a6; }

.card-body {
  padding: 14px 16px 12px;
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
}

.card-icon-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.card-icon-row i { color: var(--text-muted, #94a3b8); }

.type-badge {
  font-size: 0.72em;
  font-weight: 600;
  padding: 2px 9px;
  border-radius: 8px;
  letter-spacing: 0.02em;
}
.type-badge.research { background: rgba(20,184,166,0.15); color: #14b8a6; }
.type-badge.resource { background: rgba(20,184,166,0.15); color: #14b8a6; }

.card-title {
  font-weight: 700;
  font-size: 0.97em;
  color: var(--text, #e2e8f0);
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 2px;
}
.resource-link {
  color: inherit;
  text-decoration: none;
}
.report-card:hover .resource-link {
  text-decoration: underline;
}

.card-date {
  font-size: 0.78em;
  color: var(--text-muted, #94a3b8);
  margin-bottom: 6px;
}

.card-preview {
  font-size: 0.84em;
  color: var(--text-muted, #94a3b8);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  flex: 1;
  min-height: 0;
}

.card-pills {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: auto;
  padding-top: 6px;
}
.card-pills span {
  font-size: 0.75em;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 8px;
}
.pill-critical { background: rgba(239,68,68,0.15); color: #ef4444; }
.pill-medium  { background: rgba(245,158,11,0.15); color: #f59e0b; }
.pill-low     { background: rgba(34,197,94,0.15);  color: #22c55e; }

/* --- Modal --- */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 9000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.modal-box {
  background: var(--card-bg, #1e293b);
  border: 1px solid var(--border, #334155);
  border-radius: 14px;
  width: 92vw;
  max-width: 800px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  transform: scale(0.95);
  transition: transform 0.2s ease;
  overflow: hidden;
}
.modal-overlay.open .modal-box { transform: scale(1); }

.modal-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 20px 24px 14px;
  border-bottom: 1px solid var(--border, #334155);
  flex-shrink: 0;
}
.modal-header-info { flex: 1; min-width: 0; }
.modal-header-title {
  font-size: 1.15em;
  font-weight: 700;
  color: var(--text, #e2e8f0);
  margin-bottom: 4px;
  word-break: break-word;
}
.modal-header-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.82em;
  color: var(--text-muted, #94a3b8);
}
.modal-close {
  background: none;
  border: none;
  color: var(--text-muted, #94a3b8);
  cursor: pointer;
  padding: 4px;
  border-radius: 6px;
  flex-shrink: 0;
  transition: color 0.15s;
}
.modal-close:hover { color: var(--text, #e2e8f0); }

.modal-body {
  padding: 20px 24px 24px;
  overflow-y: auto;
  flex: 1;
  min-height: 0;
  color: var(--text, #e2e8f0);
  font-size: 0.95em;
  line-height: 1.65;
}
</style>
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <h1 class="page-title"><i data-lucide="library"></i> Knowledge</h1>
  </div>
  <div id="page-body"></div>
</div>

<!-- Modal overlay -->
<div class="modal-overlay" id="report-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-header-info">
        <div class="modal-header-title" id="modal-title"></div>
        <div class="modal-header-meta">
          <span id="modal-date"></span>
          <span class="type-badge" id="modal-badge"></span>
        </div>
      </div>
      <button class="modal-close" id="modal-close-btn" aria-label="Close">
        <i data-lucide="x" style="width:20px;height:20px"></i>
      </button>
    </div>
    <div class="modal-body rendered-md" id="modal-body"></div>
  </div>
</div>

<script src="utils.js?v=5"></script>
<script src="../data.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  function stripMd(text) {
    return (text || '')
      .replace(/\*\*(.+?)\*\*/g, '$1')
      .replace(/\*(.+?)\*/g, '$1')
      .replace(/`([^`]+)`/g, '$1')
      .replace(/^#+\s*/gm, '')
      .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
      .trim();
  }

  const d = window.__DASHBOARD_DATA__ || {};
  const resources = d.resources || [];
  const el = document.getElementById('page-body');

  if (!resources.length) {
    el.textContent = 'No resources yet';
    if (typeof lucide !== 'undefined') lucide.createIcons();
    return;
  }

  let html = '';
  html += '<div class="section-label">Resources (' + resources.length + ')</div>';
  html += '<div class="card-grid">';
  resources.filter(function(r) { return r.title; }).forEach(function(r, i) {
    var titleHtml = r.url
      ? '<a href="' + esc(r.url) + '" target="_blank" rel="noopener" class="resource-link" onclick="event.stopPropagation()">' + esc(r.title) + '</a>'
      : esc(r.title);
    html += '<div class="report-card" data-res-idx="' + i + '">'
      + '<div class="card-accent resource"></div>'
      + '<div class="card-body">'
      + '  <div class="card-icon-row">'
      + '    <i data-lucide="' + (r.type === 'video' ? 'play-circle' : 'link') + '" style="width:22px;height:22px"></i>'
      + (r.status ? '    <span class="type-badge resource">' + esc(r.status) + '</span>' : '')
      + '  </div>'
      + '  <div class="card-title">' + titleHtml + '</div>'
      + '  <div class="card-date">' + esc(r.added || '') + '</div>'
      + '  <div class="card-preview">' + esc(r.note || '') + '</div>'
      + '</div></div>';
  });
  html += '</div>';
  el.textContent = '';
  el.insertAdjacentHTML('beforeend', html);
  if (typeof lucide !== 'undefined') lucide.createIcons();

  // --- Modal logic ---
  var overlay = document.getElementById('report-modal');
  var modalTitle = document.getElementById('modal-title');
  var modalDate = document.getElementById('modal-date');
  var modalBadge = document.getElementById('modal-badge');
  var modalBody = document.getElementById('modal-body');
  var closeBtn = document.getElementById('modal-close-btn');

  function closeModal() {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  function openResourceModal(r) {
    modalTitle.textContent = r.title;
    modalDate.textContent = r.added || '';
    modalBadge.textContent = r.status || 'Resource';
    modalBadge.className = 'type-badge resource';
    var bodyEl = document.getElementById('modal-body');
    bodyEl.textContent = '';
    if (r.url) {
      var p = document.createElement('p');
      var a = document.createElement('a');
      a.href = r.url;
      a.target = '_blank';
      a.rel = 'noopener';
      a.textContent = r.url;
      p.appendChild(a);
      bodyEl.appendChild(p);
    }
    if (r.note) {
      var noteP = document.createElement('p');
      noteP.textContent = r.note;
      bodyEl.appendChild(noteP);
    }
    if (r.takeaways && r.takeaways.length) {
      var ul = document.createElement('ul');
      r.takeaways.forEach(function(t) {
        var li = document.createElement('li');
        li.textContent = t;
        ul.appendChild(li);
      });
      bodyEl.appendChild(ul);
    }
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  // Card clicks
  el.addEventListener('click', function(e) {
    var card = e.target.closest('.report-card');
    if (!card) return;
    if (card.dataset.resIdx !== undefined) {
      var ri = parseInt(card.dataset.resIdx, 10);
      var res = resources[ri];
      if (res) openResourceModal(res);
    }
  });

  // Close handlers
  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && overlay.classList.contains('open')) closeModal();
  });
});
</script>
</body>
</html>
