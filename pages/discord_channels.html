<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>Discord Channels — Hermes</title>
<link rel="stylesheet" href="../theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <h1 class="page-title"><i data-lucide="hash"></i> Discord Channels</h1>
  </div>
  <div class="page-body" id="page-body"></div>
  <div class="page-footer">built with ❤️ by e11i</div>
</div>
<script src="utils.js?v=5"></script>
<script src="../data.js"></script>
<script>

document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  const channels = d.discord_channels || [];
  if (!channels.length) { document.getElementById('page-body').innerHTML = '<div class="empty">No channels</div>'; return; }
  let html = '<div style="margin-bottom:var(--s5)"><strong style="color:var(--text-2)">Channels the bot can see and respond in:</strong></div>';
  channels.forEach(ch => {
    const icon = ch.type === 'channel' ? '#' : '\ud83e\uddf5';
    html += `<div class="cfg-row"><span class="cfg-key">${icon} ${esc(ch.name)}</span><span class="cfg-val" style="font-size:var(--fs-xs)">${esc(ch.guild)} &bull; ${esc(ch.id)}</span></div>`;
  });
  const threads = d.discord_threads || [];
  if (Array.isArray(threads) && threads.length) {
    html += '<div style="margin-top:var(--s6);margin-bottom:var(--s3)"><strong style="color:var(--text-2)">Active Threads:</strong></div>';
    threads.forEach(t => {
      html += `<div class="cfg-row"><span class="cfg-key">\ud83e\uddf5 ${esc(t)}</span><span class="cfg-val" style="font-size:var(--fs-xs)">${esc(t)}</span></div>`;
    });
  }
  document.getElementById('page-body').innerHTML = html;
  if (typeof lucide !== 'undefined') lucide.createIcons();
});

</script>
<script src="https://elizabeth1979.github.io/a11y-engineering-toolkit/ux-widget.iife.js"></script>
<script src="https://elizabeth1979.github.io/a11y-engineering-toolkit/audit-panel.iife.js"></script>
</body>
</html>
