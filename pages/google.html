<!-- AGENT RULE: Only change what Elli explicitly asks for. No extra improvements, no removing elements, no unsolicited cleanup. -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>Google Integration — Hermes</title>
<link rel="stylesheet" href="../theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="../a11y-widget.css">
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <a href="../index.html" class="back-link">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Dashboard
    </a>
    <h1 class="page-title"><i data-lucide="mail"></i> Google Integration</h1>
  </div>
  <div class="page-body" id="page-body"></div>
</div>
<script src="utils.js?v=5"></script>
<script src="../data.js"></script>
<script>

document.addEventListener('DOMContentLoaded', () => {
  const d = window.__DASHBOARD_DATA__;
  if (!d) return;
  let html = '';
  html += `<div class="cfg-row"><span class="cfg-key">OAuth Token</span><span class="cfg-val" style="color:${d.google_status === 'connected' ? 'var(--ok)' : 'var(--text-3)'}">${d.google_status === 'connected' ? '\u2713 Connected' : '\u2717 Not connected'}</span></div>`;
  html += `<div class="cfg-row"><span class="cfg-key">Client Secret</span><span class="cfg-val" style="color:${d.google_apis === 'configured' ? 'var(--ok)' : 'var(--text-3)'}">${d.google_apis === 'configured' ? '\u2713 Configured' : '\u2717 Not found'}</span></div>`;
  html += `<div style="margin-top:var(--s5);color:var(--text-3);font-size:var(--fs-sm)">APIs: Gmail, Calendar, Drive, YouTube<br>Token: ~/.hermes/google_token.json</div>`;
  document.getElementById('page-body').innerHTML = html;
  if (typeof lucide !== 'undefined') lucide.createIcons();
});

</script>
<link rel="stylesheet" href="../a11y-tester.css">
<script src="../a11y-widget.js"></script>
<script src="../a11y-tester.js"></script>
</body>
</html>
